// --- Remote File Editor (multi-pane) ---
var _fePanes = [];  // [{server, editor, original, el}, ...]
var _fePath = '';
var _EDIT_CMD = 'se';

var _FE_LANG_MAP = {
  'yml': 'yaml', 'yaml': 'yaml',
  'json': 'javascript',
  'xml': 'xml', 'html': 'xml', 'htm': 'xml', 'xhtml': 'xml', 'svg': 'xml',
  'sh': 'shell', 'bash': 'shell', 'zsh': 'shell', 'ksh': 'shell', 'csh': 'shell',
  'properties': 'properties', 'env': 'properties', 'ini': 'properties', 'cfg': 'properties',
  'toml': 'toml',
  'py': 'python',
  'conf': 'nginx',
};

function _feDetectLang(path) {
  var ext = path.split('.').pop().toLowerCase();
  var base = path.split('/').pop().toLowerCase();
  if (base === 'nginx.conf' || base.endsWith('.nginx')) return 'nginx';
  if (base === '.bashrc' || base === '.bash_profile' || base === '.profile' || base === '.zshrc') return 'shell';
  return _FE_LANG_MAP[ext] || '';
}

function _feSetLang(lang) {
  _fePanes.forEach(function(p) { p.editor.setOption('mode', lang || null); });
}

async function openFileEditor(serverNames, filePath) {
  if (typeof serverNames === 'string') serverNames = [serverNames];
  _fePath = filePath;
  var lang = _feDetectLang(filePath);
  document.getElementById('feLang').value = lang;
  document.getElementById('fePath').textContent = filePath;

  // Ensure SFTP is ready for all servers before loading
  var sftpErr = await ensureSftpForServers(serverNames);
  if (sftpErr) { appendLine('[ERROR] ' + sftpErr); return; }

  // Load files from all servers in parallel
  appendLine('[edit] Loading ' + filePath + ' from ' + serverNames.length + ' server(s)...');
  var results = {};
  var promises = serverNames.map(function(name) {
    return api('/api/read-file', { server: name, path: filePath }).then(function(r) {
      results[name] = r;
    });
  });
  await Promise.all(promises);

  // Check if any loaded
  var loaded = serverNames.filter(function(n) { return !results[n].error; });
  if (!loaded.length) {
    serverNames.forEach(function(n) { appendLine('[ERROR] [' + n + '] ' + results[n].error); });
    return;
  }

  // Clear old panes
  _fePanes = [];
  var body = document.getElementById('feBody');
  body.innerHTML = '';

  // Create panes
  serverNames.forEach(function(name) {
    var r = results[name];
    var pane = document.createElement('div');
    pane.className = 'fe-pane';

    var header = document.createElement('div');
    header.className = 'fe-pane-header';
    header.innerHTML = '<span class="fe-pane-server">' + _escAttr(name) + '</span>'
      + '<span class="fe-pane-mod">● modified</span>'
      + '<span style="flex:1"></span>'
      + '<button class="fe-btn save" data-server="' + _escAttr(name) + '" onclick="_feSavePane(this.dataset.server)">Save</button>';
    pane.appendChild(header);

    var paneWrap = document.createElement('div');
    paneWrap.className = 'fe-pane-wrap';
    var editorDiv = document.createElement('div');
    editorDiv.className = 'fe-pane-editor';
    paneWrap.appendChild(editorDiv);

    // Minimap
    var minimap = document.createElement('div');
    minimap.className = 'fe-minimap';
    var mmCanvas = document.createElement('canvas');
    minimap.appendChild(mmCanvas);
    var mmViewport = document.createElement('div');
    mmViewport.className = 'fe-minimap-viewport';
    minimap.appendChild(mmViewport);
    paneWrap.appendChild(minimap);

    pane.appendChild(paneWrap);
    body.appendChild(pane);

    if (r.error) {
      editorDiv.innerHTML = '<div style="padding:20px;color:#f87171">Error: ' + _escAttr(r.error) + '</div>';
      appendLine('[edit] [' + name + '] ' + r.error);
      return;
    }

    var editor = CodeMirror(editorDiv, {
      value: r.content,
      mode: lang || null,
      lineNumbers: true,
      theme: 'default',
      indentUnit: 2,
      tabSize: 2,
      indentWithTabs: false,
      lineWrapping: true,
      extraKeys: {
        'Ctrl-S': function() { _feSavePane(name); },
        'Cmd-S': function() { _feSavePane(name); },
        'Escape': function() { _feClose(); }
      }
    });

    var paneData = { server: name, editor: editor, original: r.content, headerEl: header, minimap: minimap, mmCanvas: mmCanvas, mmViewport: mmViewport };
    _fePanes.push(paneData);

    editor.on('cursorActivity', function() {
      var pos = editor.getCursor();
      document.getElementById('feCursor').textContent = name + ' — Ln ' + (pos.line + 1) + ', Col ' + (pos.ch + 1);
    });
    editor.on('change', function() {
      var modified = editor.getValue() !== paneData.original;
      header.querySelector('.fe-pane-mod').style.display = modified ? '' : 'none';
      if (_feDiffActive) _feUpdateMinimap(paneData);
    });
    editor.on('scroll', function() {
      if (_feDiffActive) _feUpdateMinimapViewport(paneData);
    });

    // Minimap click → jump to position
    minimap.addEventListener('click', function(e) {
      var rect = mmCanvas.getBoundingClientRect();
      var ratio = e.clientY / rect.height;
      var info = editor.getScrollInfo();
      editor.scrollTo(null, ratio * info.height - info.clientHeight / 2);
    });
  });

  // Size info
  var totalSize = loaded.reduce(function(s, n) { return s + new Blob([results[n].content]).size; }, 0);
  document.getElementById('feSize').textContent = loaded.length + ' file(s), ' + (totalSize > 1024 ? (totalSize / 1024).toFixed(1) + ' KB' : totalSize + ' B');

  // Show Diff and Save All buttons only for multi-pane
  var multiPane = _fePanes.length > 1;
  document.getElementById('feDiffBtn').style.display = multiPane ? '' : 'none';
  document.getElementById('feSaveAllBtn').style.display = multiPane ? '' : 'none';
  _feDiffActive = false;
  document.getElementById('feDiffBtn').classList.remove('diff-active');

  document.getElementById('fileEditorOverlay').classList.add('show');
  setTimeout(function() { _fePanes.forEach(function(p) { p.editor.refresh(); }); if (_fePanes[0]) _fePanes[0].editor.focus(); }, 50);
}

async function _feSavePane(serverName, skipConfirm) {
  var pane = _fePanes.find(function(p) { return p.server === serverName; });
  if (!pane) return;
  var content = pane.editor.getValue();
  if (content === pane.original) {
    _showModal('No Changes', 'No modifications on <b>' + _escAttr(serverName) + '</b>.', [{text:'OK', cls:'primary'}]);
    return;
  }
  if (!skipConfirm) {
    var ok = await modalConfirm('Confirm Save',
      'Save <code>' + _escAttr(_fePath) + '</code> on <b>' + _escAttr(serverName) + '</b>?');
    if (!ok) return;
  }
  var result = await apiWithSftp('/api/write-file', { server: serverName, path: _fePath, content: content });
  if (result.error) {
    appendLine('[ERROR] [' + serverName + '] Save failed: ' + result.error);
    return;
  }
  pane.original = content;
  pane.headerEl.querySelector('.fe-pane-mod').style.display = 'none';
  // Flash save confirmation on status bar
  var status = document.querySelector('.file-editor-status');
  status.style.background = '#16a34a';
  document.getElementById('feCursor').textContent = serverName + ' — saved';
  setTimeout(function() { status.style.background = '#007acc'; }, 600);
}

async function _feSaveAll() {
  var modified = _fePanes.filter(function(p) { return p.editor.getValue() !== p.original; });
  if (!modified.length) {
    _showModal('No Changes', 'No modifications on any server.', [{text:'OK', cls:'primary'}]);
    return;
  }
  var names = modified.map(function(p) { return p.server; });
  var ok = await modalConfirm('Confirm Save All',
    'Save <code>' + _escAttr(_fePath) + '</code> on <b>' + names.length + '</b> server(s)?<br><br>'
    + names.map(function(n) { return '&bull; ' + _escAttr(n); }).join('<br>'));
  if (!ok) return;
  for (var i = 0; i < modified.length; i++) {
    await _feSavePane(modified[i].server, true);
  }
}

function _feClose() {
  var hasUnsaved = _fePanes.some(function(p) { return p.editor.getValue() !== p.original; });
  if (hasUnsaved) {
    if (!confirm('Unsaved changes will be lost. Close anyway?')) return;
  }
  _feClearDiff();
  document.getElementById('fileEditorOverlay').classList.remove('show');
  _fePanes = [];
}

// --- Diff comparison ---
var _feDiffActive = false;
var _feSyncScrollActive = false;
var _feSyncScrolling = false;

function _feToggleDiff() {
  _feDiffActive = !_feDiffActive;
  var btn = document.getElementById('feDiffBtn');
  btn.classList.toggle('diff-active', _feDiffActive);
  btn.textContent = _feDiffActive ? 'Diff ON' : 'Diff';
  if (_feDiffActive) {
    _feComputeDiff();
    _feEnableSyncScroll();
    _feShowMinimaps();
  } else {
    _feClearDiff();
    _feDisableSyncScroll();
    _feHideMinimaps();
  }
}

function _feLCS(a, b) {
  // Compute LCS length table for line arrays
  var m = a.length, n = b.length;
  var dp = [];
  for (var i = 0; i <= m; i++) {
    dp[i] = [];
    for (var j = 0; j <= n; j++) dp[i][j] = 0;
  }
  for (var i = 1; i <= m; i++) {
    for (var j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
    }
  }
  return dp;
}

function _feLineDiff(baseLines, otherLines) {
  // Returns per-line status for both sides: 'same', 'changed', 'added', 'removed'
  var dp = _feLCS(baseLines, otherLines);
  var baseStatus = new Array(baseLines.length).fill('removed');
  var otherStatus = new Array(otherLines.length).fill('added');
  var i = baseLines.length, j = otherLines.length;
  while (i > 0 && j > 0) {
    if (baseLines[i-1] === otherLines[j-1]) {
      baseStatus[i-1] = 'same';
      otherStatus[j-1] = 'same';
      i--; j--;
    } else if (dp[i-1][j] >= dp[i][j-1]) {
      i--;
    } else {
      j--;
    }
  }
  return { base: baseStatus, other: otherStatus };
}

function _feComputeDiff() {
  if (_fePanes.length < 2) return;

  // Clear previous diff marks and summaries
  _fePanes.forEach(function(p) {
    var cm = p.editor;
    for (var i = 0; i < cm.lineCount(); i++) {
      cm.removeLineClass(i, 'wrap', 'cm-diff-changed');
      cm.removeLineClass(i, 'wrap', 'cm-diff-added');
      cm.removeLineClass(i, 'wrap', 'cm-diff-removed');
    }
    var oldSummary = p.headerEl.querySelector('.fe-diff-summary');
    if (oldSummary) oldSummary.remove();
  });

  // Collect all pane lines
  var allLines = _fePanes.map(function(p) { return p.editor.getValue().split('\n'); });
  var maxLen = Math.max.apply(null, allLines.map(function(l) { return l.length; }));
  var diffCounts = new Array(_fePanes.length).fill(0);

  // For each line number, compare across all panes
  for (var line = 0; line < maxLen; line++) {
    // Gather text at this line from each pane (undefined if pane is shorter)
    var texts = allLines.map(function(lines) { return line < lines.length ? lines[line] : undefined; });

    // Find the most common value (majority)
    var freq = {};
    var maxFreq = 0, majority = undefined;
    texts.forEach(function(t) {
      if (t === undefined) return;
      freq[t] = (freq[t] || 0) + 1;
      if (freq[t] > maxFreq) { maxFreq = freq[t]; majority = t; }
    });

    // Mark panes that differ from majority
    for (var p = 0; p < _fePanes.length; p++) {
      if (texts[p] === undefined) {
        // Pane is shorter — this line is "missing"
        // Don't mark (pane simply has fewer lines)
        continue;
      }
      if (texts[p] !== majority) {
        _fePanes[p].editor.addLineClass(line, 'wrap', 'cm-diff-changed');
        diffCounts[p]++;
      }
    }
  }

  // Extra lines in shorter panes (panes that are longer than others)
  var minLen = Math.min.apply(null, allLines.map(function(l) { return l.length; }));
  for (var p = 0; p < _fePanes.length; p++) {
    if (allLines[p].length > minLen) {
      for (var line = minLen; line < allLines[p].length; line++) {
        // Only mark if not already marked above
        var info = _fePanes[p].editor.lineInfo(line);
        if (!info.wrapClass || info.wrapClass.indexOf('cm-diff') < 0) {
          _fePanes[p].editor.addLineClass(line, 'wrap', 'cm-diff-added');
          diffCounts[p]++;
        }
      }
    }
  }

  // Show summary per pane
  _fePanes.forEach(function(pane, idx) {
    var summary = document.createElement('span');
    summary.className = 'fe-diff-summary';
    if (diffCounts[idx] === 0) {
      summary.innerHTML = '<span class="diff-same">identical</span>';
    } else {
      summary.innerHTML = '<span class="diff-diff">' + diffCounts[idx] + ' line(s) differ</span>';
    }
    pane.headerEl.appendChild(summary);
  });

  // Update minimaps after diff marks are applied
  _fePanes.forEach(function(p) { _feUpdateMinimap(p); });

  // Re-run diff on content change
  _fePanes.forEach(function(pane) {
    pane._diffChangeHandler = function() {
      if (_feDiffActive) _feComputeDiff();
    };
    pane.editor.on('change', pane._diffChangeHandler);
  });
}

function _feClearDiff() {
  _fePanes.forEach(function(p) {
    var cm = p.editor;
    for (var i = 0; i < cm.lineCount(); i++) {
      cm.removeLineClass(i, 'wrap', 'cm-diff-changed');
      cm.removeLineClass(i, 'wrap', 'cm-diff-added');
      cm.removeLineClass(i, 'wrap', 'cm-diff-removed');
    }
    var summary = p.headerEl.querySelector('.fe-diff-summary');
    if (summary) summary.remove();
    if (p._diffChangeHandler) {
      p.editor.off('change', p._diffChangeHandler);
      p._diffChangeHandler = null;
    }
  });
}

function _feEnableSyncScroll() {
  if (_feSyncScrollActive) return;
  _feSyncScrollActive = true;
  _fePanes.forEach(function(pane, idx) {
    pane._syncScrollHandler = function() {
      if (_feSyncScrolling) return;
      _feSyncScrolling = true;
      var info = pane.editor.getScrollInfo();
      // Sync by scroll percentage for files with different line counts
      var pct = info.top / Math.max(info.height - info.clientHeight, 1);
      _fePanes.forEach(function(other, j) {
        if (j === idx) return;
        var otherInfo = other.editor.getScrollInfo();
        var targetTop = pct * Math.max(otherInfo.height - otherInfo.clientHeight, 0);
        other.editor.scrollTo(info.left, targetTop);
      });
      _feSyncScrolling = false;
    };
    pane.editor.on('scroll', pane._syncScrollHandler);
  });
}

function _feDisableSyncScroll() {
  _feSyncScrollActive = false;
  _fePanes.forEach(function(pane) {
    if (pane._syncScrollHandler) {
      pane.editor.off('scroll', pane._syncScrollHandler);
      pane._syncScrollHandler = null;
    }
  });
}

// --- Diff minimap ---
function _feShowMinimaps() {
  _fePanes.forEach(function(p) {
    p.minimap.style.display = '';
    _feUpdateMinimap(p);
    _feUpdateMinimapViewport(p);
    p.editor.refresh();
  });
}

function _feHideMinimaps() {
  _fePanes.forEach(function(p) {
    p.minimap.style.display = 'none';
    p.editor.refresh();
  });
}

function _feUpdateMinimap(paneData) {
  var cm = paneData.editor;
  var canvas = paneData.mmCanvas;
  var container = paneData.minimap;
  var h = container.clientHeight;
  var w = container.clientWidth;
  if (!h || !w) return;

  var dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  var lineCount = cm.lineCount();
  if (!lineCount) return;
  var lineH = Math.max(h / lineCount, 0.5);
  var minLineH = 1;
  var effectiveH = Math.max(lineH, minLineH);

  for (var i = 0; i < lineCount; i++) {
    var y = (i / lineCount) * h;
    var info = cm.lineInfo(i);
    var wrapClass = info.wrapClass || '';

    // Determine color
    if (wrapClass.indexOf('cm-diff-changed') >= 0) {
      ctx.fillStyle = 'rgba(234,179,8,0.7)';
    } else if (wrapClass.indexOf('cm-diff-added') >= 0) {
      ctx.fillStyle = 'rgba(34,197,94,0.7)';
    } else if (wrapClass.indexOf('cm-diff-removed') >= 0) {
      ctx.fillStyle = 'rgba(239,68,68,0.7)';
    } else {
      // Normal line — show faint content indicator based on line length
      var text = cm.getLine(i) || '';
      var len = Math.min(text.length / 120, 1);
      ctx.fillStyle = 'rgba(180,180,180,' + (0.08 + len * 0.12) + ')';
    }
    ctx.fillRect(2, y, w - 4, Math.max(effectiveH - 0.5, 0.5));
  }

  _feUpdateMinimapViewport(paneData);
}

function _feUpdateMinimapViewport(paneData) {
  var cm = paneData.editor;
  var container = paneData.minimap;
  var vp = paneData.mmViewport;
  var containerH = container.clientHeight;
  if (!containerH) return;

  var scrollInfo = cm.getScrollInfo();
  var totalH = scrollInfo.height;
  if (totalH <= 0) return;

  var topRatio = scrollInfo.top / totalH;
  var visRatio = scrollInfo.clientHeight / totalH;

  vp.style.top = (topRatio * containerH) + 'px';
  vp.style.height = Math.max(visRatio * containerH, 8) + 'px';
}

function _isEditCommand(cmd) {
  var prefix = _EDIT_CMD + ' ';
  if (cmd.indexOf(prefix) === 0) return cmd.substring(prefix.length).trim();
  return null;
}
function _isDownloadCommand(cmd) {
  if (cmd.indexOf('dl ') === 0) return cmd.substring(3).trim();
  return null;
}

async function downloadRemoteFile(names, filePath) {
  var sftpErr = await ensureSftpForServers(names);
  if (sftpErr) { appendLine('[ERROR] ' + sftpErr); return; }
  appendLine('[download] Fetching ' + filePath + ' from ' + names.length + ' server(s)...');
  var result = await api('/api/download-file', { servers: names, path: filePath });
  if (result.error) { appendLine('[ERROR] ' + result.error); return; }

  var fileName = filePath.split('/').pop();
  var keys = Object.keys(result.files);

  // Pack into zip (single or multiple servers)
  var zip = new JSZip();
  var count = 0;
  keys.forEach(function(name) {
    var data = result.files[name];
    if (data.error) {
      appendLine('[download] [' + name + '] ERROR: ' + data.error);
    } else if (data.binary) {
      // Binary file — decode base64 to Uint8Array
      var raw = atob(data.b64);
      var bytes = new Uint8Array(raw.length);
      for (var i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
      zip.file(name + '/' + fileName, bytes);
      count++;
    } else {
      zip.file(name + '/' + fileName, data.content);
      count++;
    }
  });
  if (count > 0) {
    var blob = await zip.generateAsync({ type: 'blob' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = count === 1 ? fileName.replace(/(\.[^.]+)$/, '_' + keys[0] + '$1') + '.zip'
      : fileName.replace(/\.[^.]+$/, '') + '_' + count + 'servers.zip';
    a.click();
    URL.revokeObjectURL(a.href);
    appendLine('[download] Saved zip: ' + a.download + ' (' + count + ' file(s))');
  }
}

function _triggerDownload(filename, content) {
  var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// --- Scheduled Command ---
var _schedTimer = null;
var _schedCmd = '';
var _schedInterval = 60;
var _schedRunning = false;
var _schedSilent = false;

function _schedKey(key) {
  var cfg = document.getElementById('configSelect').value || 'default';
  return 'sched:' + cfg + ':' + key;
}
function _loadSchedConfig() {
  _schedCmd = localStorage.getItem(_schedKey('cmd')) || '';
  _schedInterval = parseInt(localStorage.getItem(_schedKey('interval'))) || 60;
  _schedSilent = localStorage.getItem(_schedKey('silent')) === '1';
}

function openScheduleModal() {
  var cmd = _schedCmd || document.getElementById('cmdInput').value.trim();
  var interval = _schedInterval;
  var cfgName = document.getElementById('configSelect').selectedOptions[0].textContent || 'default';
  var html = '<div style="display:flex;flex-direction:column;gap:10px">'
    + '<label style="font-size:12px;color:#555">Command</label>'
    + '<input type="text" id="schedCmdInput" value="' + _escAttr(cmd) + '" placeholder="Enter command to run periodically" style="font-family:Consolas,monospace;font-size:13px;padding:6px 10px;border:1px solid #bbb;border-radius:3px">'
    + '<label style="font-size:12px;color:#555">Interval (seconds)</label>'
    + '<input type="number" id="schedIntervalInput" value="' + interval + '" min="10" max="86400" style="width:120px;padding:6px 10px;border:1px solid #bbb;border-radius:3px;font-size:13px">'
    + '<label style="font-size:12px;color:#555;display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="schedSilentCheck"' + (_schedSilent ? ' checked' : '') + '> Silent mode <span style="font-size:11px;color:#999">(no output in panel, still logged to file)</span></label>'
    + '<div style="font-size:11px;color:#888">Min 10s. Command will run on all selected servers.</div>'
    + '<div style="font-size:11px;color:#aaa;border-top:1px solid #eee;padding-top:6px">Settings saved per config (<b>' + _escAttr(cfgName) + '</b>)</div>'
    + '</div>';
  var buttons = [];
  if (_schedRunning) {
    buttons.push({ text: '\u25a0 Stop', cls: 'btn danger', action: function() { stopSchedule(); } });
  }
  buttons.push({ text: _schedRunning ? 'Update' : '\u25b6 Start', cls: 'btn primary', noAutoClose: true, action: function() { startSchedule(); } });
  buttons.push({ text: 'Cancel', cls: 'btn', action: function() {} });
  _showModal('Schedule Periodic Command', html, buttons);
}

function startSchedule() {
  var cmd = document.getElementById('schedCmdInput').value.trim();
  var interval = parseInt(document.getElementById('schedIntervalInput').value) || 60;
  if (!cmd) { appendLine('[ERROR] Enter a command for schedule'); return; }
  var err = checkInteractiveCmd(cmd);
  if (err) { appendLine('[ERROR] ' + err); return; }
  if (interval < 10) interval = 10;

  _schedCmd = cmd;
  _schedInterval = interval;
  _schedSilent = document.getElementById('schedSilentCheck').checked;
  localStorage.setItem(_schedKey('cmd'), cmd);
  localStorage.setItem(_schedKey('interval'), interval);
  localStorage.setItem(_schedKey('silent'), _schedSilent ? '1' : '0');
  stopSchedule(true);

  _schedRunning = true;
  _updateSchedIndicator();
  appendLine('[Schedule] Started: "' + cmd + '" every ' + interval + 's' + (_schedSilent ? ' (silent)' : ''));
  _runScheduledCmd();
  _schedTimer = setInterval(_runScheduledCmd, interval * 1000);
  _closeModal();
}

function stopSchedule(silent) {
  if (_schedTimer) { clearInterval(_schedTimer); _schedTimer = null; }
  if (_schedRunning && !silent) {
    appendLine('[Schedule] Stopped');
  }
  _schedRunning = false;
  _updateSchedIndicator();
}

async function _runScheduledCmd() {
  if (!_schedRunning) return;
  if (!_backendAlive) {
    appendLine('[Schedule] Backend unreachable, stopping schedule');
    _schedRunning = false;
    _updateSchedIndicator();
    return;
  }
  var names = getSelectedServers();
  if (!names.length) {
    if (!_schedSilent) appendLine('[Schedule] No servers selected, skipping');
    return;
  }
  var cmd = resolveAlias(_schedCmd);
  var result = await api('/api/run-command', { servers: names, command: cmd, silent: _schedSilent });
  if (result.error && !_schedSilent) appendLine('[Schedule] ' + result.error);
}

function _updateSchedIndicator() {
  var el = document.getElementById('schedIndicator');
  var label = document.getElementById('schedLabel');
  if (_schedRunning) {
    el.style.display = '';
    var prefix = _schedSilent ? '\uD83D\uDD07 ' : '';
    label.textContent = prefix + _schedInterval + 's: ' + (_schedCmd.length > 30 ? _schedCmd.substring(0, 30) + '...' : _schedCmd);
  } else {
    el.style.display = 'none';
  }
}

function _escAttr(s) { return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

async function runCommand() {
  _touchAdhoc();
  var input = document.getElementById('cmdInput');
  var raw = input.value.trim();
  if (!raw) { appendLine('[ERROR] Enter a command first'); return; }
  var cmd = resolveAlias(raw);

  // Intercept built-in commands: se /path (edit), dl /path (download)
  var editPath = _isEditCommand(cmd);
  if (editPath) {
    if (!editPath.startsWith('/') && _cwd) editPath = _cwd + editPath;
    var names = getSelectedServers();
    if (!names.length) { appendLine('[ERROR] No servers selected'); return; }
    input.value = '';
    openFileEditor(names, editPath);
    return;
  }
  var dlPath = _isDownloadCommand(cmd);
  if (dlPath) {
    if (!dlPath.startsWith('/') && _cwd) dlPath = _cwd + dlPath;
    var names = getSelectedServers();
    if (!names.length) { appendLine('[ERROR] No servers selected'); return; }
    input.value = '';
    downloadRemoteFile(names, dlPath);
    return;
  }

  var err = checkInteractiveCmd(cmd);
  if (err) { appendLine('[ERROR] ' + err); return; }

  // Track cwd changes from cd/ls commands
  _cwdDetectFromCommand(cmd);

  var names = getSelectedServers();
  if (!names.length) { appendLine('[ERROR] No servers selected'); return; }

  // For cd-only commands, just update cwd without running
  if (/^\s*cd\s/.test(cmd)) {
    appendLine('$ ' + cmd);
    appendLine('[cwd] ' + _cwd);
    input.value = '';
    return;
  }

  // Prepend cwd for server-side execution
  var serverCmd = _cwdPrependCmd(cmd);

  if (isModifyingCmd(cmd)) {
    var ok = await modalConfirm('Confirm Dangerous Command',
      '<div style="margin-bottom:8px;color:#b91c1c;font-weight:bold">This command may modify the system:</div>'
      + '<pre style="background:#f8f8f8;padding:8px;border-radius:4px;font-size:13px;margin:0 0 8px 0;white-space:pre-wrap">' + _escAttr(cmd) + '</pre>'
      + (_cwd ? '<div style="font-size:12px;color:#888;margin-bottom:4px">Working directory: ' + _escAttr(_cwd) + '</div>' : '')
      + '<div style="font-size:12px;color:#555">Servers (' + names.length + '): <b>' + _escAttr(names.join(', ')) + '</b></div>');
    if (!ok) return;
  }

  appendLine('$ ' + (cmd !== raw ? raw + '  \u2192  ' + cmd : cmd));
  var result = await api('/api/run-command', { servers: names, command: serverCmd });
  if (result.error) { appendLine('[ERROR] ' + result.error); return; }
  input.value = '';
  setTimeout(loadCmdHistory, 500);
}

async function runCompare() {
  _touchAdhoc();
  var input = document.getElementById('cmdInput');
  var raw = input.value.trim();
  if (!raw) { appendLine('[ERROR] Enter a command first'); return; }
  var cmd = resolveAlias(raw);

  // Intercept built-in commands
  if (_isEditCommand(cmd)) { appendLine('[ERROR] "se" is an editor command, not comparable — use Run instead'); return; }
  if (_isDownloadCommand(cmd)) { appendLine('[ERROR] "dl" is a download command, not comparable — use Run instead'); return; }

  var err = checkInteractiveCmd(cmd);
  if (err) { appendLine('[ERROR] ' + err); return; }

  var names = getSelectedServers();
  if (names.length < 2) { appendLine('[ERROR] Compare needs at least 2 servers selected'); return; }

  var serverCmd = _cwdPrependCmd(cmd);
  appendLine('[Compare] Running "' + cmd + '" on ' + names.length + ' servers...');
  var result = await api('/api/run-command-compare', { servers: names, command: serverCmd });
  if (result.error) { appendLine('[ERROR] ' + result.error); return; }

  // Build compare view
  document.getElementById('cmpCmd').textContent = cmd;
  var body = document.getElementById('compareBody');
  body.innerHTML = '';
  names.forEach(function(name) {
    var data = result.results[name];
    if (!data) return;
    var col = document.createElement('div');
    col.className = 'compare-col';
    var exitCls = data.exit_code === 0 ? 'ok' : 'fail';
    var exitText = data.exit_code === 0 ? 'OK' : 'exit ' + data.exit_code;
    col.innerHTML = '<div class="compare-col-header">' + _escAttr(name)
      + '<span class="cmp-exit ' + exitCls + '">' + exitText + '</span></div>'
      + '<div class="compare-col-body"></div>';
    col.querySelector('.compare-col-body').textContent = data.lines.join('\n');
    body.appendChild(col);
  });
  document.getElementById('compareOverlay').classList.add('show');
  input.value = '';

  // Sync scroll across compare columns
  var cols = body.querySelectorAll('.compare-col-body');
  var syncing = false;
  cols.forEach(function(col) {
    col.addEventListener('scroll', function() {
      if (syncing) return;
      syncing = true;
      var pct = col.scrollTop / Math.max(col.scrollHeight - col.clientHeight, 1);
      cols.forEach(function(other) {
        if (other === col) return;
        other.scrollTop = pct * Math.max(other.scrollHeight - other.clientHeight, 0);
      });
      syncing = false;
    });
  });
}

async function uploadFiles() {
  _touchAdhoc();
  var dest = document.getElementById('destInput').value.trim();
  if (!dest) { appendLine('[ERROR] Enter a remote path first'); return; }
  if (!pendingFiles.length) { appendLine('[ERROR] Select files first'); return; }

  var names = getSelectedServers();
  if (!names.length) { appendLine('[ERROR] No servers selected'); return; }

  if (pendingFiles.length > 1 && !dest.endsWith('/')) {
    appendLine('[ERROR] Multiple files — dest must end with / (directory)');
    return;
  }
  var isDir = dest.endsWith('/');
  var mode = document.getElementById('execCheck').checked ? '0755' : '';

  for (var i = 0; i < pendingFiles.length; i++) {
    var file = pendingFiles[i];
    var fileDest = isDir ? dest + file.name : dest;

    var formData = new FormData();
    formData.append('file', file);
    formData.append('dest', fileDest);
    formData.append('servers', names.join(','));
    if (mode) formData.append('mode', mode);

    appendLine('Uploading ' + file.name + ' -> ' + fileDest + '...');
    try {
      var res = await fetch('/api/upload', { method: 'POST', body: formData });
      var result = await res.json();
      if (result.error) {
        appendLine('[ERROR] ' + result.error);
      }
    } catch (e) {
      _setBackendAlive(false);
      appendLine('[ERROR] Backend unreachable — upload failed');
    }
  }

  clearFileList();
  setTimeout(loadUploadHistory, 500);
}

        _markInvalid('asPort', true);
        if (errEl) { errEl.textContent = 'Port must be a number between 1 and 65535'; errEl.style.display = ''; }
        document.getElementById('asPort').focus();
        return null;
      }

        document.getElementById('modalOverlay').classList.add('show');
      } else {
        appendLine('Server "' + (body.name || body.host) + '" added to config');
        loadServers();
      }
    }}
  ]);
  // Keyboard support: Enter to submit, Escape to cancel
  var wrap = document.getElementById('asFormWrap');
  if (wrap) {
    wrap.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();

        if (addBtn) addBtn.click();

      if (e.key === 'Escape') { e.preventDefault(); _closeModal(); }

(function() {

  }
})();

// --- File path detection and context menu ---
var _FP_RE = /(\/(?:[a-zA-Z0-9._-]+\/)*[a-zA-Z0-9._-]+(?:\.[a-zA-Z0-9]+)?\/?)/g;
// Detect filenames in ls -l output: ... HH:MM filename or ... YYYY filename
var _LS_FILE_RE = /\d{2}:\d{2}\s+(.+)$|[A-Z][a-z]{2}\s+\d+\s+\d{4}\s+(.+)$/;
var _fpCurrentPath = '';
var _fpCurrentServer = '';
var _fpLastDir = '';  // directory context from command headers
var _fpIsListCmd = false;  // whether last command was ls/ll/find

function _isLikelyFilePath(p) {
  var parts = p.split('/').filter(Boolean);
  if (parts.length < 1) return false;
  if (/^(etc|var|tmp|opt|usr|home|root|srv|proc|sys|dev|run|mnt|media|boot)$/.test(parts[0])) return true;
  if (parts.length < 2) return false;
  var last = parts[parts.length - 1];
  if (last.indexOf('.') > 0) return true;
  return false;
}
function _looksLikeDir(path) {
  // No extension in last segment → likely a directory (e.g. /home/testuser, /var/log)
  var p = path.replace(/\/+$/, '');
  var last = p.substring(p.lastIndexOf('/') + 1);
  return last.indexOf('.') < 0;
}

function _extractDirFromCmd(text) {
  // Match: ── [server] $ ls -ltr /dir ── or ls -l /dir or ll /dir or find /dir ...
  var m = text.match(/(?:\$\s+)?(?:ls|find|ll)\s+(?:-[^\s]*\s+)*(\/[^\s─]*)/);
  if (m) {
    var d = m[1];
    if (!d.endsWith('/')) d += '/';
    return d;
  }
  return '';
}

function _fpDblClick(e) {
  e.stopPropagation();
  e.preventDefault();
  clearTimeout(_fpClickTimer);
  document.getElementById('fpMenu').classList.remove('show');
  var span = e.currentTarget;
  var path = span.dataset.path;
  if (!path) return;
  // Resolve server from line context
  var line = span.closest('.out-line') || span.closest('.line');
  var prefixEl = line ? line.querySelector('.server-prefix') : null;
  var sysPrefixes = ['edit', 'copy', 'download', 'delete', 'upload', 'compare', 'INFO', 'WARN'];
  var rawServer = prefixEl ? prefixEl.textContent.replace(/^\[|\]\s*$/g, '') : '';
  var server = sysPrefixes.indexOf(rawServer) >= 0 ? '' : rawServer;
  var names = server ? [server] : getSelectedServers();
  if (!names.length) { appendLine('[ERROR] No servers selected'); return; }
  // Resolve relative path via pwd if needed
  if (!path.startsWith('/')) {
    api('/api/run-command', { servers: [names[0]], command: 'pwd' }).then(function(r) {
      if (r && r.results) {
        var pwd = (r.results[names[0]] || '').trim();
        if (pwd) {
          var dir = pwd.endsWith('/') ? pwd : pwd + '/';
          path = dir + path;
          _cwdSet(dir);
        }
      }
      var dirPath = path.endsWith('/') ? path : path + '/';
      _cwdSet(dirPath);
      api('/api/run-command', { servers: names, command: 'ls -ltr ' + dirPath });
    });
    return;
  }
  var dirPath = path.endsWith('/') ? path : path + '/';
  _cwdSet(dirPath);
  api('/api/run-command', { servers: names, command: 'ls -ltr ' + dirPath });
}

function _makeFpSpan(displayText, fullPath, isDir) {
  // For directory paths, make each segment independently clickable (with / root)
  // Only split when displayText is the full path (absolute path in output), not ls filenames
  if (isDir && displayText === fullPath && fullPath.startsWith('/') && fullPath.split('/').filter(Boolean).length >= 1) {
    var frag = document.createDocumentFragment();
    var parts = fullPath.replace(/\/+$/, '').split('/').filter(Boolean);
    // Leading / as clickable root
    var rootSpan = document.createElement('span');
    rootSpan.className = 'fp-link fp-seg';
    rootSpan.textContent = '/';
    rootSpan.dataset.path = '/';
    rootSpan.dataset.dir = '1';
    rootSpan.addEventListener('click', _fpOnClick);
    rootSpan.addEventListener('dblclick', _fpDblClick);
    frag.appendChild(rootSpan);
    for (var i = 0; i < parts.length; i++) {
      var cumPath = '/' + parts.slice(0, i + 1).join('/') + '/';
      var seg = document.createElement('span');
      seg.className = 'fp-link fp-seg';
      seg.textContent = parts[i];
      seg.dataset.path = cumPath;
      seg.dataset.dir = '1';
      seg.addEventListener('click', _fpOnClick);
      seg.addEventListener('dblclick', _fpDblClick);
      frag.appendChild(seg);
      if (i < parts.length - 1) {
        var sep = document.createElement('span');
        sep.className = 'fp-sep';
        sep.textContent = '/';
        frag.appendChild(sep);
      }
    }
    if (fullPath.endsWith('/')) {
      var trail = document.createElement('span');
      trail.className = 'fp-sep';
      trail.textContent = '/';
      frag.appendChild(trail);
    }
    return frag;
  }
  var span = document.createElement('span');
  span.className = 'fp-link';
  span.textContent = displayText;
  span.dataset.path = fullPath;
  if (isDir) {
    span.dataset.dir = '1';
    span.addEventListener('dblclick', _fpDblClick);
  }
  span.addEventListener('click', _fpOnClick);
  return span;
}

function _appendWithPaths(parent, text) {
  // 1. Try absolute paths
  var isLsDir = /^d/.test(text); // ls -l directory line
  var match, last = 0;
  _FP_RE.lastIndex = 0;
  var found = false;
  while ((match = _FP_RE.exec(text)) !== null) {
    var path = match[1];
    if (!_isLikelyFilePath(path)) continue;
    found = true;
    var dirFlag = path.endsWith('/') || isLsDir || _looksLikeDir(path);
    if (match.index > last) parent.appendChild(document.createTextNode(text.slice(last, match.index)));
    parent.appendChild(_makeFpSpan(path, path, dirFlag));
    last = match.index + match[0].length;
  }
  if (found) {
    if (last < text.length) parent.appendChild(document.createTextNode(text.slice(last)));
    return;
  }
  // 2. Try ls -l filename detection
  if (_fpLastDir || _fpIsListCmd) {
    var lsMatch = text.match(_LS_FILE_RE);
    if (lsMatch) {
      var fileName = (lsMatch[1] || lsMatch[2] || '').trim();
      // Handle symlinks: name -> target
      var arrow = fileName.indexOf(' -> ');
      if (arrow > 0) fileName = fileName.substring(0, arrow);
      if (fileName && fileName.indexOf(' ') < 0) {
        var fullPath = _fpLastDir ? _fpLastDir + fileName : fileName;
        // Detect directory: ls -l lines starting with 'd'
        var isDir = /^d/.test(text);
        var idx = text.lastIndexOf(fileName);
        if (idx >= 0) {
          parent.appendChild(document.createTextNode(text.substring(0, idx)));
          parent.appendChild(_makeFpSpan(fileName, fullPath, isDir));
          if (idx + fileName.length < text.length) parent.appendChild(document.createTextNode(text.substring(idx + fileName.length)));
          return;
        }
      }
    }
    // 3. Try plain ls output (just a filename, no -l details)
    // Reject lines with spaces or colons (error messages, not filenames)
    var plainName = text.trim();
    if (plainName && !/[\s:]/.test(plainName) && !/^total$/.test(plainName)) {
      var fullPath = _fpLastDir ? _fpLastDir + plainName : plainName;
      var isDir = _looksLikeDir(plainName);
      parent.appendChild(_makeFpSpan(plainName, fullPath, isDir));
      return;
    }
  }
  parent.appendChild(document.createTextNode(text));
}

function _linkifyPaths(container) {
  // Check if this line is a directory entry from ls -l
  var fullText = container.textContent || '';
  // Strip timestamp and server prefix to check if line starts with 'd'
  var stripped = fullText.replace(/^\[\d{2}:\d{2}:\d{2}\]\s*(\[[^\]]+\]\s*)?/, '');
  var isLsDir = /^d/.test(stripped);

  var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
  var textNodes = [];
  while (walker.nextNode()) {
    var node = walker.currentNode;
    if (node.parentNode.classList && (node.parentNode.classList.contains('ts') || node.parentNode.classList.contains('server-prefix'))) continue;
    if (_FP_RE.test(node.textContent)) textNodes.push(node);
    _FP_RE.lastIndex = 0;
  }
  textNodes.forEach(function(node) {
    var text = node.textContent;
    var frag = document.createDocumentFragment();
    var match, last = 0;
    _FP_RE.lastIndex = 0;
    var replaced = false;
    while ((match = _FP_RE.exec(text)) !== null) {
      var path = match[1];
      if (!_isLikelyFilePath(path)) continue;
      replaced = true;
      var dirFlag = path.endsWith('/') || isLsDir || _looksLikeDir(path);
      if (match.index > last) frag.appendChild(document.createTextNode(text.slice(last, match.index)));
      var fpEl = _makeFpSpan(path, path, dirFlag);
      if (node.parentNode.style && node.parentNode.style.cssText) {
        var css = node.parentNode.style.cssText;
        if (fpEl.nodeType === 11) { // DocumentFragment — apply to each child
          Array.from(fpEl.children).forEach(function(ch) { ch.style.cssText = css; });
        } else { fpEl.style.cssText = css; }
      }
      frag.appendChild(fpEl);
      last = match.index + match[0].length;
    }
    if (replaced) {
      if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
      node.parentNode.replaceChild(frag, node);
    }
  });
  // If no absolute paths found, try plain ls filename detection
  if (!textNodes.length && (_fpLastDir || _fpIsListCmd)) {
    var plainText = stripped.trim();
    if (plainText && !/[\s:]/.test(plainText) && !/^total$/.test(plainText)) {
      // Find the text node with this content (skip ts/prefix nodes)
      var walker2 = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
      while (walker2.nextNode()) {
        var nd = walker2.currentNode;
        if (nd.parentNode.classList && (nd.parentNode.classList.contains('ts') || nd.parentNode.classList.contains('server-prefix'))) continue;
        var fname = nd.textContent.trim();
        if (fname && !/[\s:]/.test(fname) && !/^total$/.test(fname)) {
          var fullPath = _fpLastDir ? _fpLastDir + fname : fname;
          var isDir = _looksLikeDir(fname);
          var span = _makeFpSpan(fname, fullPath, isDir);
          if (nd.parentNode.style && nd.parentNode.style.cssText) {
            var css = nd.parentNode.style.cssText;
            if (span.nodeType === 11) { Array.from(span.children).forEach(function(ch) { ch.style.cssText = css; }); }
            else { span.style.cssText = css; }
          }
          nd.parentNode.replaceChild(span, nd);
          break;
        }
      }
    }
  }
}

var _fpIsDir = false;
var _fpClickTimer = null;

function _fpOnClick(e) {
  e.stopPropagation();
  // For directories, delay to allow dblclick to cancel
  if (e.currentTarget.dataset.dir) {
    var evt = e;
    var target = e.currentTarget;
    clearTimeout(_fpClickTimer);
    _fpClickTimer = setTimeout(function() { _fpShowMenu(evt, target); }, 250);
    return;
  }
  _fpShowMenu(e, e.currentTarget);
}

function _fpShowMenu(e, target) {
  var path = target.dataset.path;
  _fpCurrentPath = path;
  _fpIsDir = !!target.dataset.dir;
  var line = target.closest('.out-line') || target.closest('.line');
  var prefixEl = line ? line.querySelector('.server-prefix') : null;
  var _fpSystemPrefixes = ['edit', 'copy', 'download', 'delete', 'upload', 'compare', 'INFO', 'WARN'];
  var rawServer = prefixEl ? prefixEl.textContent.replace(/^\[|\]\s*$/g, '') : '';
  _fpCurrentServer = _fpSystemPrefixes.indexOf(rawServer) >= 0 ? '' : rawServer;
  var menu = document.getElementById('fpMenu');

  // Show/hide items based on file vs directory
  menu.querySelectorAll('.fp-file-only').forEach(function(el) { el.style.display = _fpIsDir ? 'none' : ''; });
  menu.querySelectorAll('.fp-dir-only').forEach(function(el) { el.style.display = _fpIsDir ? '' : 'none'; });

  var x = e.clientX, y = e.clientY;
  menu.classList.add('show');
  var rect = menu.getBoundingClientRect();
  if (x + rect.width > window.innerWidth) x = window.innerWidth - rect.width - 8;
  if (y + rect.height > window.innerHeight) y = y - rect.height;
  if (x < 0) x = 8;
  if (y < 0) y = 8;
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
}

document.addEventListener('click', function(e) {
  var menu = document.getElementById('fpMenu');
  if (menu && !menu.contains(e.target) && !e.target.classList.contains('fp-link')) {
    menu.classList.remove('show');
  }
});

async function _fpAction(action) {
  document.getElementById('fpMenu').classList.remove('show');
  var path = _fpCurrentPath;
  if (!path) return;
  if (action === 'copyName') {
    var name = path.replace(/\/+$/, '').split('/').pop();
    try { navigator.clipboard.writeText(name); } catch(e) {}
    return;
  }
  if (action === 'copyPath') {
    try { navigator.clipboard.writeText(path); } catch(e) {}
    return;
  }

  var names = _fpCurrentServer ? [_fpCurrentServer] : getSelectedServers();
  if (!names.length) { appendLine('[ERROR] No server context — select servers first'); return; }

  // Resolve relative paths by querying pwd on the server
  if (path && !path.startsWith('/')) {
    try {
      var pwdResult = await api('/api/run-command', { servers: [names[0]], command: 'pwd' });
      if (pwdResult && pwdResult.results) {
        var pwdLine = (pwdResult.results[names[0]] || '').trim();
        if (pwdLine) {
          var dir = pwdLine.endsWith('/') ? pwdLine : pwdLine + '/';
          path = dir + path;
          _fpCurrentPath = path;
          _cwdSet(dir);
        }
      }
    } catch(e) {}
  }
  if (!path.startsWith('/')) { appendLine('[ERROR] Cannot resolve path — try setting cwd first (cd /path)'); return; }

  if (action === 'copy') {
    appendLine('[copy] Reading ' + path + ' from ' + names[0] + '...');
    var result = await apiWithSftp('/api/read-file', { server: names[0], path: path });
    if (result.error) { appendLine('[ERROR] ' + result.error); return; }
    try {
      await navigator.clipboard.writeText(result.content);
      appendLine('[copy] File content copied to clipboard (' + result.content.length + ' chars)');
    } catch(e) { appendLine('[ERROR] Clipboard write failed: ' + e.message); }
  } else if (action === 'openDir') {
    var dirPath = path.endsWith('/') ? path : path + '/';
    _cwdSet(dirPath);
    var cmd = 'ls -ltr ' + dirPath;
    var input = document.getElementById('cmdInput');
    input.value = '';
    await api('/api/run-command', { servers: names, command: cmd });
  } else if (action === 'parentDir') {
    var dirPath = path.replace(/\/+$/, '');
    var parent = dirPath.substring(0, dirPath.lastIndexOf('/'));
    if (!parent) parent = '/';
    if (!parent.endsWith('/')) parent += '/';
    _cwdSet(parent);
    var cmd = 'ls -ltr ' + parent;
    var input = document.getElementById('cmdInput');
    input.value = '';
    await api('/api/run-command', { servers: names, command: cmd });
  } else if (action === 'edit') {
    openFileEditor(names, path);
  } else if (action === 'editAll') {
    var allNames = getSelectedServers();
    if (!allNames.length) { appendLine('[ERROR] No servers selected'); return; }
    var ok = await modalConfirm(
      'Open on All Servers',
      'Open <code>' + _escAttr(path) + '</code> on <b>' + allNames.length + '</b> server(s)?<br><br>'
      + allNames.map(function(n) { return '&bull; ' + _escAttr(n); }).join('<br>')
    );
    if (!ok) return;
    openFileEditor(allNames, path);
  } else if (action === 'download') {
    downloadRemoteFile(names, path);
  } else if (action === 'delete') {
    var ok = await modalConfirm(
      'Delete Remote File',
      'Delete <code>' + _escAttr(path) + '</code> on <b>' + names.join(', ') + '</b>?<br><br>'
      + '<b style="color:#dc2626">This action cannot be undone.</b>'
    );
    if (!ok) return;
    appendLine('[delete] Deleting ' + path + ' on ' + names.join(', ') + '...');
    var result = await api('/api/delete-remote-file', { servers: names, path: path });
    if (result.error) { appendLine('[ERROR] ' + result.error); return; }
    var results = result.results || {};
    Object.keys(results).forEach(function(name) {
      if (results[name].error) appendLine('[ERROR] [' + name + '] ' + results[name].error);
      else appendLine('[delete] [' + name + '] Deleted');
    });
  }
}

// --- Current Working Directory tracking ---
var _cwd = '';

function _cwdRender() {
  var bar = document.getElementById('cwdBar');
  var bc = document.getElementById('cwdBreadcrumb');
  if (!_cwd) {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = '';
  var parts = _cwd.split('/').filter(Boolean);
  var html = '<span class="cwd-seg" onclick="_cwdNavigate(\'/\')" title="/">/</span>';
  for (var i = 0; i < parts.length; i++) {
    var partial = '/' + parts.slice(0, i + 1).join('/');
    html += '<span class="cwd-sep">/</span><span class="cwd-seg" onclick="_cwdNavigate(\'' + partial + '/\')" title="' + partial + '">' + parts[i] + '</span>';
  }
  bc.innerHTML = html;
}

function _cwdNavigate(path) {
  _cwdSet(path);
  // Auto-run ls -ltr in the new directory
  var names = getSelectedServers();
  if (names.length) {
    var cmd = 'ls -ltr ' + path;
    document.getElementById('cmdInput').value = cmd;
    runCommand();
  }
}

function _cwdSet(path) {
  if (!path) path = '/';
  // Ensure trailing slash
  if (!path.endsWith('/')) path += '/';
  _cwd = path;
  _fpLastDir = path;
  _cwdRender();
}

function _cwdReset() {
  _cwd = '';
  _fpLastDir = '';
  _cwdRender();
}

async function _cwdSync() {
  var names = getSelectedServers();
  if (!names.length) { appendLine('[ERROR] No servers selected'); return; }
  var result = await api('/api/run-command-compare', { servers: [names[0]], command: 'pwd' });
  if (result.error) { appendLine('[ERROR] ' + result.error); return; }
  var data = result.results[names[0]];
  if (data && data.lines && data.lines.length) {
    var dir = data.lines[0].trim();
    if (dir.startsWith('/')) {
      _cwdSet(dir);
      appendLine('[cwd] Synced: ' + _cwd);
    }
  }
}

function _cwdDetectFromCommand(cmd) {
  // Detect cd commands and update cwd
  var m = cmd.match(/^\s*cd\s+(\/[^\s;&|]+)/);
  if (m) {
    _cwdSet(m[1]);
    return;
  }
  // cd with relative path
  var m2 = cmd.match(/^\s*cd\s+([^\s;&|]+)/);
  if (m2 && _cwd) {
    var rel = m2[1];
    if (rel === '..') {
      var parts = _cwd.split('/').filter(Boolean);
      parts.pop();
      _cwdSet('/' + parts.join('/'));
    } else if (rel === '~' || rel === '') {
      // Can't resolve ~ without server, ignore
    } else if (!rel.startsWith('/')) {
      _cwdSet(_cwd + rel);
    }
    return;
  }
  // Detect ls commands with directory argument → update cwd
  var m3 = cmd.match(/(?:ls|ll)\s+(?:-[^\s]*\s+)*(\/[^\s]+)/);
  if (m3) {
    var dir = m3[1];
    if (!dir.endsWith('/')) dir += '/';
    _cwdSet(dir);
  }
}

function _cwdPrependCmd(cmd) {
  // If cwd is set and command doesn't start with cd or absolute path command, prepend cd
  if (!_cwd || _cwd === '/') return cmd;
  // Don't prepend for built-in commands
  if (/^\s*(se|dl)\s/.test(cmd)) return cmd;
  // Don't prepend if command already has cd
  if (/^\s*cd\s/.test(cmd)) return cmd;
  return 'cd ' + _cwd.replace(/\/$/, '') + ' && ' + cmd;
}
