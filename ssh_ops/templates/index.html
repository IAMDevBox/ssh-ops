<style>

  .status { font-size: 12px; color: #16a34a; white-space: nowrap; }

  body.hide-progress .task-status { display: none; }
  body.hide-progress .mini-progress, body.hide-progress .task-progress { display: none !important; }
  .task-progress { margin: 6px 8px; display: none; }
  .task-progress .progress-bar { height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
  .task-progress .progress-fill { height: 100%; background: #2563eb; border-radius: 3px; transition: width 0.3s; width: 0; }
  .task-progress .progress-fill.has-failure { background: #dc2626; }

  .task-progress .progress-text { font-size: 11px; color: #666; margin-top: 3px; display: block; }

  .panel-toolbar .tbtn:hover { color: #2563eb; border-color: #2563eb; background: #fff; }
  .panel-toolbar .tbtn.active { color: #2563eb; border-color: #2563eb; }
  .panel-toolbar .tbtn.danger:hover { color: #dc2626; border-color: #dc2626; }
  .hide-ts .ts, .hide-ts .server-prefix { display: none; }
  .tab-panel { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; overflow-y: auto; background: #fff; padding: 10px; font-family: Consolas, 'Courier New', monospace; font-size: 13px; line-height: 1.5; }
  .tab-panel.active { display: block; }
  .tab-panel .line { white-space: pre-wrap; word-break: break-all; }

  .tab-panel .output-block { background: #f8f8f8; border-left: 3px solid #d1d5db; padding: 6px 10px; margin: 0 0 4px 0; position: relative; white-space: pre-wrap; word-break: break-all; }

  .adhoc-toggle { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #888; white-space: nowrap; cursor: pointer; user-select: none; }

  .cwd-bar { background: #f0f4ff; border-top: 1px solid #ddd; padding: 3px 10px; display: flex; align-items: center; gap: 4px; font-size: 12px; font-family: Consolas, monospace; color: #555; }
  .cwd-bar .cwd-label { color: #888; font-size: 10px; text-transform: uppercase; margin-right: 4px; }
  .cwd-bar .cwd-seg { cursor: pointer; padding: 1px 3px; border-radius: 2px; color: #2563eb; }
  .cwd-bar .cwd-seg:hover { background: #dbeafe; }

  .cwd-bar .cwd-home:hover { background: #e8e8e8; color: #333; }

  .cwd-bar .cwd-sync:hover { background: #e8e8e8; color: #333; }
  .actions { background: #fff; border-top: 1px solid #ddd; padding: 10px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .modal { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 20px; min-width: 360px; max-width: 800px; width: 50vw; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }

  .file-editor-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #1e1e1e; z-index: 2000; flex-direction: column; }
  .file-editor-overlay.show { display: flex; }
  .file-editor-toolbar { display: flex; align-items: center; gap: 10px; padding: 6px 12px; background: #2d2d2d; color: #ccc; font-size: 13px; border-bottom: 1px solid #444; }
  .file-editor-toolbar .fe-path { flex: 1; font-family: Consolas, monospace; color: #e0e0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-editor-toolbar .fe-server { color: #6cb6ff; font-weight: bold; }
  .file-editor-toolbar .fe-modified { color: #fbbf24; margin-left: 4px; display: none; }
  .file-editor-toolbar .fe-btn { padding: 4px 12px; border: 1px solid #555; border-radius: 3px; background: #3c3c3c; color: #ddd; cursor: pointer; font-size: 12px; }
  .file-editor-toolbar .fe-btn:hover { background: #4c4c4c; }
  .file-editor-toolbar .fe-btn.save { background: #2563eb; border-color: #1d4ed8; color: #fff; }
  .file-editor-toolbar .fe-btn.save:hover { background: #1d4ed8; }
  .file-editor-toolbar select { padding: 3px 6px; background: #3c3c3c; color: #ddd; border: 1px solid #555; border-radius: 3px; font-size: 12px; }
  .file-editor-body { flex: 1; display: flex; overflow: hidden; gap: 1px; background: #444; }
  .fe-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #1e1e1e; }
  .fe-pane-header { display: flex; align-items: center; gap: 6px; padding: 4px 8px; background: #2d2d2d; border-bottom: 1px solid #444; font-size: 12px; color: #ccc; }
  .fe-pane-header .fe-pane-server { color: #6cb6ff; font-weight: bold; }
  .fe-pane-header .fe-pane-mod { color: #fbbf24; display: none; }
  .fe-pane-header .fe-btn { padding: 2px 8px; font-size: 11px; }
  .fe-pane-editor { flex: 1; overflow: hidden; }
  .fe-pane-editor .CodeMirror { height: 100%; font-size: 14px; }
  .file-editor-status { padding: 3px 12px; background: #007acc; color: #fff; font-size: 11px; display: flex; gap: 16px; }
  /* Diff highlighting */
  .fe-btn.diff-active { background: #16a34a; border-color: #15803d; color: #fff; }
  .fe-btn.diff-active:hover { background: #15803d; }
  .cm-diff-changed { background: rgba(234,179,8,0.15) !important; }
  .cm-diff-added { background: rgba(34,197,94,0.15) !important; }
  .cm-diff-removed { background: rgba(239,68,68,0.15) !important; }
  .cm-diff-changed .CodeMirror-linenumber { color: #eab308; }
  .cm-diff-added .CodeMirror-linenumber { color: #22c55e; }
  .cm-diff-removed .CodeMirror-linenumber { color: #ef4444; }
  .fe-diff-summary { font-size: 11px; color: #aaa; margin-left: auto; padding-right: 4px; }
  .fe-diff-summary .diff-same { color: #888; }
  .fe-diff-summary .diff-diff { color: #eab308; font-weight: bold; }

  /* Diff minimap */
  .fe-pane-wrap { display: flex; flex: 1; min-height: 0; position: relative; }
  .fe-pane-wrap .fe-pane-editor { flex: 1; }
  .fe-minimap { width: 40px; background: #252525; cursor: pointer; position: relative; flex-shrink: 0; display: none; }
  .fe-minimap canvas { width: 100%; height: 100%; }
  .fe-minimap-viewport { position: absolute; left: 0; right: 0; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); pointer-events: none; min-height: 8px; }

  /* Compare view */
  .compare-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #f5f5f5; z-index: 1500; flex-direction: column; }
  .compare-overlay.show { display: flex; }
  .compare-toolbar { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #fff; border-bottom: 1px solid #ddd; font-size: 13px; }
  .compare-toolbar .cmp-cmd { flex: 1; font-family: Consolas, monospace; color: #2563eb; font-weight: bold; }
  .compare-body { flex: 1; display: flex; overflow: auto; gap: 1px; background: #ddd; }
  .compare-col { flex: 1; min-width: 200px; display: flex; flex-direction: column; background: #fff; }
  .compare-col-header { padding: 6px 10px; background: #f0f4ff; font-weight: bold; font-size: 12px; color: #1e40af; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1; }
  .compare-col-header .cmp-exit { font-weight: normal; margin-left: 6px; }
  .compare-col-header .cmp-exit.ok { color: #16a34a; }
  .compare-col-header .cmp-exit.fail { color: #dc2626; }
  .compare-col-body { flex: 1; overflow: auto; padding: 6px 8px; font-family: Consolas, monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; line-height: 1.5; }

  /* File path context menu */
  .fp-link { text-decoration: underline dotted; text-decoration-color: rgba(100,160,255,0.4); text-underline-offset: 2px; cursor: pointer; position: relative; border-radius: 2px; transition: background 0.15s; }
  .fp-link:hover { background: rgba(37,99,235,0.12); text-decoration-color: #2563eb; }
  .fp-seg { text-decoration: none !important; padding: 0 1px; }
  .fp-seg:hover { text-decoration: underline dotted !important; text-decoration-color: #2563eb !important; }
  .fp-sep { color: inherit; opacity: 0.5; }
  .fp-menu { display: none; position: fixed; background: #fff; border: 1px solid #ddd; border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); z-index: 3000; padding: 4px 0; min-width: 160px; font-size: 12px; }
  .fp-menu.show { display: block; }
  .fp-menu-item { display: flex; align-items: center; padding: 6px 12px; cursor: pointer; color: #333; white-space: nowrap; border: none; background: none; width: 100%; text-align: left; font-size: 12px; gap: 8px; }
  .fp-menu-item:hover { background: #f0f4ff; }
  .fp-menu-item .fp-icon { width: 16px; text-align: center; flex-shrink: 0; opacity: 0.7; }
  .fp-menu-item.danger { color: #dc2626; }
  .fp-menu-item.danger:hover { background: #fef2f2; }
</style>

<body>

<header>
  <h1 onclick="_showHelpModal()" title="Click for help">SSH Ops Tool</h1>
  <span class="header-tips" id="headerTips"></span>
  <div class="header-right">
    <div class="config-bar">
      <select id="configSelect" onchange="switchConfig()"></select>
      <div class="config-menu-wrap">
        <button class="config-menu-btn" onclick="toggleConfigMenu(event)" title="Config actions">&#8942;</button>
        <div class="config-menu" id="configMenu">
          <button class="config-menu-item" onclick="reloadConfig();closeConfigMenu()"><span class="mi">&#x21bb;</span>Reload</button>
          <button class="config-menu-item" onclick="newConfigModal();closeConfigMenu()"><span class="mi">+</span>New</button>
          <button class="config-menu-item" onclick="duplicateConfigModal();closeConfigMenu()"><span class="mi">&#x2398;</span>Duplicate</button>
          <button class="config-menu-item" onclick="renameConfigModal();closeConfigMenu()"><span class="mi">&#x270e;</span>Rename</button>
          <button class="config-menu-item" onclick="editConfigYaml();closeConfigMenu()"><span class="mi">&#x270e;</span>Edit YAML</button>
          <button class="config-menu-item" onclick="downloadConfig();closeConfigMenu()"><span class="mi">&#x2913;</span>Download</button>
          <button class="config-menu-item danger" onclick="deleteConfigModal();closeConfigMenu()"><span class="mi">&#x2716;</span>Delete</button>
        </div>
      </div>
    </div>
    <span class="status" id="wsStatus">Connecting...</span>
  </div>
</header>

<div class="main">
  <div class="panel">
    <div class="section-title" style="display:flex;align-items:center;justify-content:space-between">
      <span>Servers <span class="section-count" id="serverCount"></span></span>
      <div class="config-menu-wrap">
        <button class="config-menu-btn" onclick="toggleServerMenu(event)" title="More actions">&#8942;</button>
        <div class="config-menu" id="serverMenu">
          <button class="config-menu-item" onclick="addServerModal();closeServerMenu()"><span class="mi">+</span>Add Server</button>
          <button class="config-menu-item" onclick="proxySettingsModal();closeServerMenu()"><span class="mi">&#x1f512;</span>Proxy (PSMP)</button>
          <button class="config-menu-item" onclick="copyHosts();closeServerMenu()"><span class="mi">&#x2398;</span>Copy Selected Hosts</button>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn primary" onclick="connectSelected()">&#x26a1; Connect</button>
      <button class="btn danger" onclick="disconnectSelected()">&#x2715; Disconnect</button>
      <button class="btn" onclick="toggleAll()">&#x2611; Select All</button>
    </div>
    <input type="text" class="filter-input" id="serverFilter" placeholder="Filter servers..." oninput="filterServers()" style="display:none">
    <div id="serverList" class="list-scroll"></div>

    <div class="section-title" style="display:flex;align-items:center;justify-content:space-between">
      <span>Tasks <span class="section-count" id="taskCount"></span></span>
      <div class="config-menu-wrap">
        <button class="config-menu-btn" onclick="toggleTaskMenu(event)" title="More actions">&#8942;</button>
        <div class="config-menu" id="taskMenu">
          <button class="config-menu-item" onclick="addTaskModal();closeTaskMenu()"><span class="mi">+</span>Add Task</button>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn primary" id="btnRun" onclick="runSelectedTasks()">&#x25b6; Run</button>
      <button class="btn danger" id="btnCancel" onclick="cancelTasks()" style="display:none">&#x25a0; Cancel</button>
      <button class="btn" onclick="toggleAllTasks()">&#x2611; Select All</button>
      <button class="btn" onclick="viewTasksYaml()">{ } YAML</button>
      <button class="btn" id="btnToggleProgress" onclick="toggleProgress(this)" title="Toggle progress display" style="font-size:11px;padding:2px 7px">P &#x2713;</button>
    </div>
    <div id="taskList"></div>
    <div class="task-progress" id="taskProgress">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-text" id="progressText"></span>
    </div>
  </div>
  <div class="divider" id="divider"></div>
  <div class="content">
    <div class="tab-bar" id="tabBar">
      <div class="tab active" data-tab="main" onclick="switchTab('main')">Output</div>
    </div>
    <div class="tab-panels" id="tabPanels">
      <div class="panel-toolbar">
        <button class="tbtn" onclick="toggleTimestamps(this)" title="Hide timestamps and prefixes">T</button>
        <button class="tbtn" onclick="copyLines('output')" title="Copy all output">&#x2398; All</button>

        <button class="tbtn" onclick="scrollToBottom()" title="Scroll to bottom">&#x21E9;</button>
        <button class="tbtn danger" onclick="clearActivePanel()" title="Clear" id="clearPanelBtn">&#x2715; Clear</button>
      </div>
      <div class="tab-panel active" id="panel-main"></div>
    </div>
    <div class="cwd-bar" id="cwdBar" style="display:none">
      <span class="cwd-label">cwd</span>
      <span id="cwdBreadcrumb"></span>
      <span class="cwd-home" onclick="_cwdReset()" title="Reset to /">&#x2302;</span>
      <span class="cwd-sync" onclick="_cwdSync()" title="Sync from server (pwd)">&#x21bb; sync</span>
    </div>
    <div class="actions locked" id="actionsPanel">
      <label class="adhoc-toggle unlock-exempt" title="Enable ad-hoc command and file upload. Auto-locks after 60s of inactivity."><input type="checkbox" id="adhocToggle" class="unlock-exempt" onchange="toggleAdhoc(this.checked)">Ad-hoc <span class="countdown" id="adhocCountdown"></span></label>
      <button class="btn unlock-exempt" onclick="openScheduleModal()" title="Schedule periodic command" style="font-size:11px;padding:2px 7px">&#x23F0; Schedule</button>
      <button class="btn unlock-exempt" onclick="openAliasesModal()" title="Command aliases" style="font-size:11px;padding:2px 7px">Aliases</button>
      <span id="schedIndicator" class="sched-indicator" style="display:none" onclick="openScheduleModal()"><span class="sched-dot"></span><span id="schedLabel"></span><span class="sched-stop" onclick="event.stopPropagation();stopSchedule()" title="Stop">&times;</span></span>
      <div class="cmd-wrap">
        <input type="text" id="cmdInput" placeholder="Enter command... (interactive commands like top/vim/less not allowed)" onkeydown="cmdInputKeydown(event)" autocomplete="off">
        <span id="aliasHint" class="alias-hint" style="display:none"></span>
        <div class="alias-suggest" id="aliasSuggest"></div>
      </div>
      <select id="cmdHistory" onchange="pickCmdHistory()"><option value="">History</option></select>
      <button class="btn" onclick="deleteCmdHistoryItem()" title="Delete selected history item" style="padding:3px 5px;font-size:10px;color:#bbb" id="cmdHistDelBtn">&#x2715;</button>
      <select id="cmdFavorites" onchange="pickFavorite()" style="max-width:140px"><option value="">&#x2605; Favorites</option></select>
      <button class="btn" onclick="toggleFavorite()" title="Pin/unpin current command as favorite" style="padding:3px 6px;font-size:12px;color:#f59e0b" id="favToggleBtn">&#x2606;</button>
      <button class="btn primary" onclick="runCommand()">&#x25b6; Run</button>
      <button class="btn" onclick="runCompare()" title="Run and compare output across servers">&#x2194; Compare</button>
      <button class="btn" onclick="addCmdToTasks()">+ Task</button>
      <div class="upload-row">
        <input type="file" id="fileInput" multiple>
        <button class="btn" onclick="document.getElementById('fileInput').click()">&#x1f4ce; Files</button>
        <span class="file-count" id="fileCount"></span>
        <button class="btn" onclick="clearFileList()" id="fileClearBtn" style="display:none">&#x2715; Clear</button>
        <input type="text" id="destInput" placeholder="Absolute file path: /opt/app/file.txt (multi-file: /opt/app/)">
        <label class="exec-label" title="Set mode 0755 (executable)"><input type="checkbox" id="execCheck">exec</label>
        <select id="uploadHistory" onchange="pickUploadHistory()"><option value="">History</option></select>
        <button class="btn" onclick="deleteUploadHistoryItem()" title="Delete selected history item" style="padding:3px 5px;font-size:10px;color:#bbb" id="uplHistDelBtn">&#x2715;</button>
        <button class="btn" onclick="uploadFiles()">&#x21e7; Upload</button>
      </div>
      <div class="file-list" id="fileList"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-body" id="modalBody"></div>
    <input class="modal-input" id="modalInput" style="display:none">
    <div class="modal-hint" id="modalHint" style="display:none"></div>
    <div class="modal-buttons" id="modalButtons"></div>
  </div>
</div>

<!-- Compare view overlay -->
<div class="compare-overlay" id="compareOverlay">
  <div class="compare-toolbar">
    <span>Compare:</span>
    <span class="cmp-cmd" id="cmpCmd"></span>
    <button class="btn" onclick="document.getElementById('compareOverlay').classList.remove('show')">Close</button>
  </div>
  <div class="compare-body" id="compareBody"></div>
</div>

<!-- Full-screen remote file editor (multi-pane) -->
<div class="file-editor-overlay" id="fileEditorOverlay">
  <div class="file-editor-toolbar">
    <span class="fe-path" id="fePath"></span>
    <select id="feLang" onchange="_feSetLang(this.value)" title="Syntax">
      <option value="">Plain Text</option>
      <option value="yaml">YAML</option>
      <option value="javascript">JSON</option>
      <option value="xml">XML</option>
      <option value="shell">Shell</option>
      <option value="properties">Properties</option>
      <option value="toml">TOML</option>
      <option value="python">Python</option>
      <option value="nginx">Nginx</option>
    </select>
    <button class="fe-btn" id="feDiffBtn" onclick="_feToggleDiff()" title="Toggle diff comparison" style="display:none">Diff</button>
    <button class="fe-btn save" id="feSaveAllBtn" onclick="_feSaveAll()" title="Save all modified panes" style="display:none">Save All</button>
    <button class="fe-btn" onclick="_feClose()">Close</button>
  </div>
  <div class="file-editor-body" id="feBody"></div>
  <div class="file-editor-status">
    <span id="feCursor">Ln 1, Col 1</span>
    <span id="feEncoding">UTF-8</span>
    <span id="feSize"></span>
  </div>
</div>

<!-- File path context menu (floating) -->
<div class="fp-menu" id="fpMenu">
  <button class="fp-menu-item" onclick="_fpAction('copyName')"><span class="fp-icon">&#x2398;</span>Copy name</button>
  <button class="fp-menu-item" onclick="_fpAction('copyPath')"><span class="fp-icon">&#x2398;</span>Copy path</button>
  <button class="fp-menu-item fp-file-only" onclick="_fpAction('copy')"><span class="fp-icon">&#x2398;</span>Copy file content</button>
  <button class="fp-menu-item fp-file-only" onclick="_fpAction('edit')"><span class="fp-icon">&#x270e;</span>Open in editor</button>
  <button class="fp-menu-item fp-file-only" onclick="_fpAction('editAll')"><span class="fp-icon">&#x270e;</span>Open on all servers</button>
  <button class="fp-menu-item fp-dir-only" onclick="_fpAction('openDir')"><span class="fp-icon">&#x25B6;</span>Open directory (ls -ltr)</button>
  <button class="fp-menu-item fp-dir-only" onclick="_fpAction('parentDir')"><span class="fp-icon">&#x25B2;</span>Go to parent directory</button>
  <button class="fp-menu-item fp-file-only" onclick="_fpAction('download')"><span class="fp-icon">&#x2913;</span>Download</button>
  <button class="fp-menu-item fp-file-only danger" onclick="_fpAction('delete')"><span class="fp-icon">&#x2716;</span>Delete</button>
</div>

<script>
var activeTab = 'main';
var logTimers = {};
let ws;

function timeStr() {
  var d = new Date();
  return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2);
}

// --- File accumulator (supports cross-directory selection) ---
var pendingFiles = [];

document.getElementById('fileInput').addEventListener('change', function() {
  for (var i = 0; i < this.files.length; i++) {
    pendingFiles.push(this.files[i]);
  }
  this.value = '';
  renderFileList();
});

function renderFileList() {
  var list = document.getElementById('fileList');
  var count = document.getElementById('fileCount');
  var clearBtn = document.getElementById('fileClearBtn');
  list.textContent = '';
  count.textContent = pendingFiles.length ? pendingFiles.length + ' file' + (pendingFiles.length > 1 ? 's' : '') : '';
  clearBtn.style.display = pendingFiles.length ? '' : 'none';
  pendingFiles.forEach(function(f, idx) {
    var tag = document.createElement('span');
    tag.className = 'file-tag';
    tag.textContent = f.name;
    var rm = document.createElement('span');
    rm.className = 'file-rm';
    rm.textContent = '\u00d7';
    rm.title = 'Remove';
    rm.addEventListener('click', function() {
      pendingFiles.splice(idx, 1);
      renderFileList();
    });
    tag.appendChild(rm);
    list.appendChild(tag);
  });
}

// --- Command aliases ---
var _aliases = {};
async function loadAliases() {
  try {
    var res = await fetch('/api/aliases');
    _aliases = await res.json();
  } catch(e) { _aliases = {}; }
  _updateAliasHint();
}
function resolveAlias(cmd) {
  if (!cmd) return cmd;
  // Exact match: "status" -> "systemctl status xxx"
  if (_aliases[cmd]) return _aliases[cmd];
  // Prefix match: "status arg1" -> "systemctl status xxx arg1"
  var space = cmd.indexOf(' ');
  if (space > 0) {
    var name = cmd.substring(0, space);
    var rest = cmd.substring(space);
    if (_aliases[name]) return _aliases[name] + rest;
  }
  return cmd;
}
function _updateAliasHint() {
  var input = document.getElementById('cmdInput');
  var hint = document.getElementById('aliasHint');
  if (!hint) return;
  var cmd = input.value.trim();
  var resolved = resolveAlias(cmd);
  if (resolved !== cmd) {
    hint.textContent = '\u2192 ' + resolved;
    hint.style.display = '';
  } else {
    hint.style.display = 'none';
  }
}

function openAliasesModal() {
  var entries = Object.entries(_aliases);
  var rows = '';
  for (var i = 0; i < entries.length; i++) {
    rows += _aliasRow(i, entries[i][0], entries[i][1]);
  }
  var html = '<div style="display:flex;flex-direction:column;gap:8px">'
    + '<div style="font-size:11px;color:#888">Define short names for common commands. Aliases expand automatically in the command input.</div>'
    + '<div style="font-size:11px;color:#6cb6ff;background:#1e293b;padding:6px 10px;border-radius:4px;line-height:1.6;font-family:Consolas,monospace">'
    + '<b style="color:#fbbf24">Built-in commands:</b><br>'
    + '<b>se</b> <span style="color:#aaa">/path/to/file</span> &mdash; Open remote file in editor (multi-server side-by-side, text only)<br>'
    + '<b>dl</b> <span style="color:#aaa">/path/to/file</span> &mdash; Download remote file (multi-server auto zip, supports binary)<br>'
    + '<span style="color:#888;font-size:10px">Output file paths are clickable: copy name/path/content, edit, download, delete. Binary files only support download and delete.</span>'
    + '</div>'
    + '<div id="aliasRows" style="display:flex;flex-direction:column;gap:4px">' + rows + '</div>'
    + '<button class="btn" onclick="_addAliasRow()" style="align-self:flex-start;font-size:11px;padding:2px 8px">+ Add</button>'
    + '<div id="aliasError" style="display:none;color:#dc2626;font-size:12px;padding:4px 8px;background:#fef2f2;border-radius:3px"></div>'
    + '</div>';
  _showModal('Command Aliases', html, [
    { text: 'Save', cls: 'btn primary', noAutoClose: true, action: function() { _saveAliases(); } },
    { text: 'Cancel', cls: 'btn', action: function() {} }
  ]);
  _initAliasDrag();
}
function _aliasRow(i, name, cmd) {
  return '<div class="alias-row" draggable="true" style="display:flex;gap:6px;align-items:center">'
    + '<span class="drag-handle" title="Drag to reorder" style="cursor:grab;color:#bbb;font-size:14px;padding:0 2px;user-select:none">\u2261</span>'
    + '<input type="text" class="alias-name" value="' + _escAttr(name || '') + '" placeholder="name" style="width:100px;padding:4px 6px;border:1px solid #bbb;border-radius:3px;font-family:Consolas,monospace;font-size:12px">'
    + '<span style="color:#999">\u2192</span>'
    + '<input type="text" class="alias-cmd" value="' + _escAttr(cmd || '') + '" placeholder="command" style="flex:1;padding:4px 6px;border:1px solid #bbb;border-radius:3px;font-family:Consolas,monospace;font-size:12px">'
    + '<button class="btn" onclick="this.parentElement.remove()" style="padding:2px 5px;font-size:10px;color:#bbb" title="Remove">\u2715</button>'
    + '</div>';
}
var _dragRow = null;
function _initAliasDrag() {
  var container = document.getElementById('aliasRows');
  container.addEventListener('dragstart', function(e) {
    var row = e.target.closest('.alias-row');
    if (!row) return;
    _dragRow = row;
    row.style.opacity = '0.4';
    e.dataTransfer.effectAllowed = 'move';
  });
  container.addEventListener('dragend', function(e) {
    if (_dragRow) { _dragRow.style.opacity = ''; _dragRow = null; }
    container.querySelectorAll('.alias-row').forEach(function(r) { r.style.borderTop = ''; });
  });
  container.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    var target = e.target.closest('.alias-row');
    container.querySelectorAll('.alias-row').forEach(function(r) { r.style.borderTop = ''; });
    if (target && target !== _dragRow) {

var _modalResolve = null;

function _showModal(title, bodyHtml, buttons, inputOpts) {

function _closeModal() {

function modalConfirm(title, bodyHtml) {
  return new Promise(function(resolve) {
    _modalResolve = resolve;
    _showModal(title, bodyHtml, [
      { text: 'Cancel', action: function() { _modalResolve = null; resolve(false); } },
      { text: 'Confirm', cls: 'primary', action: function() { _modalResolve = null; resolve(true); } }
    ]);
  });
}

function _getModalValue(opts) {
  var val = document.getElementById('modalInput').value;
  return (opts && opts.otp) ? val.replace(/\s/g, '') : val;
}

function _formatOtp(input) {
  var pos = input.selectionStart;
  var raw = input.value.replace(/\s/g, '');
  var formatted = raw.replace(/(.{4})(?=.)/g, '$1 ');
  if (input.value !== formatted) {
    var spacesBeforeCursor = (input.value.slice(0, pos).match(/ /g) || []).length;
    input.value = formatted;
    var newSpaces = (formatted.slice(0, pos).match(/ /g) || []).length;
    input.selectionStart = input.selectionEnd = pos + (newSpaces - spacesBeforeCursor);
  }
}

function modalPrompt(title, bodyHtml, defaultVal, hint, opts) {
  return new Promise(function(resolve) {
    _modalResolve = resolve;
    var _opts = opts || {};
    _showModal(title, bodyHtml, [
      { text: 'Cancel', action: function() { _modalResolve = null; resolve(null); } },
      { text: 'OK', cls: 'primary', action: function() { _modalResolve = null; resolve(_getModalValue(_opts)); } }
    ], { value: defaultVal || '', hint: hint || '', narrow: _opts.narrow });
    var inp = document.getElementById('modalInput');
    if (_opts.otp) {
      inp.setAttribute('autocomplete', 'one-time-code');
      inp.style.letterSpacing = '2px';
      inp.style.fontFamily = 'monospace';
      inp.style.fontSize = '18px';
      inp.style.textAlign = 'center';
      inp.addEventListener('input', function otpHandler() { _formatOtp(inp); });
    }
    inp.addEventListener('keydown', function handler(e) {
      if (e.key === 'Enter') { e.target.removeEventListener('keydown', handler); _closeModal(); _modalResolve = null; resolve(_getModalValue(_opts)); }
      if (e.key === 'Escape') { e.target.removeEventListener('keydown', handler); _closeModal(); _modalResolve = null; resolve(null); }
    });
  });
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {

function colorizeLogLine(line) {
  if (/failed|\[ERROR\]|FAILED/i.test(line)) return 'error';
  if (/\[WARN\]/i.test(line)) return 'warn';
  if (/=> OK|Connected|Uploaded/i.test(line)) return 'success';
  if (/^===/.test(line) || /\] \$ /.test(line)) return 'info';
  return '';
}

async function refreshLogTab(serverName) {
  var panel = document.getElementById('panel-log-' + serverName);
  if (!panel) return;
  var res = await fetch('/api/logs/' + encodeURIComponent(serverName));
  var text = await res.text();
  var atBottom = panel.scrollTop + panel.clientHeight >= panel.scrollHeight - 20;
  panel.innerHTML = '';
  var lines = text.split('\n');
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (!line && i === lines.length - 1) continue;
    var div = document.createElement('div');
    div.className = 'line';
    var cls = colorizeLogLine(line);
    if (cls) div.classList.add(cls);
    // Wrap leading [HH:MM:SS] timestamp in <span class="ts">
    var tsMatch = line.match(/^(\[\d{2}:\d{2}:\d{2}\] )/);
    if (tsMatch) {
      var tsSpan = document.createElement('span');
      tsSpan.className = 'ts';
      tsSpan.textContent = tsMatch[1];
      div.appendChild(tsSpan);
      var rest = line.slice(tsMatch[1].length);
      var ansiFrag = ansiToHtml(rest);
      if (ansiFrag) div.appendChild(ansiFrag);
      else div.appendChild(document.createTextNode(rest));
    } else {
      var ansiFrag = ansiToHtml(line);
      if (ansiFrag) div.appendChild(ansiFrag);
      else div.textContent = line;
    }
    panel.appendChild(div);
  }
  if (atBottom) panel.scrollTop = panel.scrollHeight;
}

// --- ANSI color code parser ---
var _ANSI_COLORS = {
  '30': '#000', '31': '#dc2626', '32': '#16a34a', '33': '#d97706',
  '34': '#2563eb', '35': '#9333ea', '36': '#0891b2', '37': '#888',
  '90': '#666', '91': '#ef4444', '92': '#22c55e', '93': '#eab308',
  '94': '#3b82f6', '95': '#a855f7', '96': '#06b6d4', '97': '#ccc'
};
var _ANSI_BG = {
  '40': '#000', '41': '#dc2626', '42': '#16a34a', '43': '#d97706',
  '44': '#2563eb', '45': '#9333ea', '46': '#0891b2', '47': '#e5e5e5',
  '100': '#666', '101': '#ef4444', '102': '#22c55e', '103': '#eab308',
  '104': '#3b82f6', '105': '#a855f7', '106': '#06b6d4', '107': '#fff'
};

function ansiToHtml(text) {
  if (text.indexOf('\x1b') === -1) return null;
  var parts = text.split(/\x1b\[([0-9;]*)m/);
  if (parts.length <= 1) return null;
  var frag = document.createDocumentFragment();
  var fg = '', bg = '', bold = false, underline = false;
  for (var i = 0; i < parts.length; i++) {
    if (i % 2 === 0) {
      if (parts[i]) {
        var span = document.createElement('span');
        var style = '';
        if (fg) style += 'color:' + fg + ';';
        if (bg) style += 'background:' + bg + ';';
        if (bold) style += 'font-weight:bold;';
        if (underline) style += 'text-decoration:underline;';
        if (style) span.style.cssText = style;
        span.textContent = parts[i];
        frag.appendChild(span);
      }
    } else {
      var codes = parts[i].split(';');
      for (var j = 0; j < codes.length; j++) {
        var c = codes[j];
        if (c === '0' || c === '') { fg = ''; bg = ''; bold = false; underline = false; }
        else if (c === '1') bold = true;
        else if (c === '4') underline = true;
        else if (_ANSI_COLORS[c]) fg = _ANSI_COLORS[c];
        else if (_ANSI_BG[c]) bg = _ANSI_BG[c];
      }
    }
  }
  return frag;
}

function _lineText(line) {
  // Copy what's visible: skip hidden elements (.copy-out always, .ts/.server-prefix only when hide-ts active)
  var hideTs = document.getElementById('tabPanels').classList.contains('hide-ts');
  var parts = [];
  for (var i = 0; i < line.childNodes.length; i++) {
    var node = line.childNodes[i];
    if (node.nodeType === 3) { parts.push(node.textContent); continue; }
    if (node.classList && node.classList.contains('copy-out')) continue;
    if (hideTs && node.classList && (node.classList.contains('ts') || node.classList.contains('server-prefix'))) continue;
    parts.push(node.textContent);
  }
  return parts.join('');
}


// --- Terminal output (main tab) ---
var _currentOutputBlock = null;

function _classifyLine(text) {
  if (text.includes('[ERROR]') || text.includes('FAILED') || /^✗/.test(text)) return 'error';
  if (text.includes('[WARN]')) return 'warn';
  if (/^✓/.test(text)) return 'success';
  if (text.startsWith('──') || /^\[[^\]]+\]\s*\$\s/.test(text)) return 'cmd-input';
  if (text.startsWith('[Schedule]') || text.startsWith('[Done]')) return 'info';
  // Only lines with [servername] prefix (and not $ commands) are output
  if (/^\[[^\]]+\]\s/.test(text) && !text.includes('[ERROR]') && !text.includes('[WARN]')) return 'output';
  return 'info';
}

function appendLine(text) {
  var panel = document.getElementById('panel-main');
  var cls = _classifyLine(text);

  // Track directory context from command headers for ls filename linkification
  if (cls === 'cmd-input') {
    var dir = _extractDirFromCmd(text);
    if (dir) _fpLastDir = dir;
    else _fpLastDir = _cwd || '';
    // Track if this is a listing command (ls/ll/find) even without path
    _fpIsListCmd = /(?:\$\s+)?(?:ls|ll|find|dir)\b/.test(text);
  }

  // Non-output line → close current output block
  if (cls !== 'output' && _currentOutputBlock) {
    _closeOutputBlock();
  }

  if (cls === 'output') {
    // Start new output block if needed
    if (!_currentOutputBlock) {
      _currentOutputBlock = document.createElement('div');
      _currentOutputBlock.className = 'line output-block';
      _currentOutputBlock.appendChild(_makeCopyBtn());
      panel.appendChild(_currentOutputBlock);
    }
    // Add line inside output block
    var outLine = document.createElement('div');
    outLine.className = 'out-line';
    _buildLineContent(outLine, text);
    // Insert before bottom copy button if it exists, otherwise just append
    var bottomBtn = _currentOutputBlock.querySelector('.copy-out.bottom');
    if (bottomBtn) {
      _currentOutputBlock.insertBefore(outLine, bottomBtn);
    } else {
      _currentOutputBlock.appendChild(outLine);
    }
    // Add/remove bottom copy button based on line count
    var lineCount = _currentOutputBlock.querySelectorAll('.out-line').length;
    if (lineCount > 10 && !bottomBtn) {
      _currentOutputBlock.appendChild(_makeCopyBtn(true));
    }
  } else {
    var div = document.createElement('div');
    div.className = 'line ' + cls;
    _buildLineContent(div, text);
    panel.appendChild(div);
  }
  panel.scrollTop = panel.scrollHeight;
}

function _buildLineContent(div, text) {
  var tsSpan = document.createElement('span');
  tsSpan.className = 'ts';
  tsSpan.textContent = '[' + timeStr() + '] ';
  var m = text.match(/^\[([^\]]+)\] /);
  if (m && !text.includes('[ERROR]') && !text.includes('[WARN]')) {
    var serverName = m[1];
    var rest = text.slice(m[0].length);
    div.appendChild(tsSpan);
    var prefix = document.createElement('span');
    prefix.className = 'server-prefix';
    prefix.textContent = '[' + serverName + '] ';
    div.appendChild(prefix);
    var ansiFrag = ansiToHtml(rest);
    if (ansiFrag) { div.appendChild(ansiFrag); _linkifyPaths(div); }
    else { _appendWithPaths(div, rest); }
  } else {
    div.appendChild(tsSpan);
    var ansiFrag2 = ansiToHtml(text);
    if (ansiFrag2) { div.appendChild(ansiFrag2); _linkifyPaths(div); }
    else { _appendWithPaths(div, text); }
  }
}

// --- OTP reuse detection (shared across tabs via localStorage) ---
var _OTP_STORAGE_KEY = 'ssh_ops_recent_otps';

function _hashOtp(otp) {
  // Simple hash for equality check — not cryptographic, just avoids storing plaintext
  var h = 0;
  for (var i = 0; i < otp.length; i++) {
    h = ((h << 5) - h + otp.charCodeAt(i)) | 0;
  }
  return 'h' + (h >>> 0).toString(36);
}

function _loadRecentOtps() {
  try {
    var raw = localStorage.getItem(_OTP_STORAGE_KEY);
    if (!raw) return [];
    var entries = JSON.parse(raw);
    var now = Date.now();
    return entries.filter(function(e) { return now - e.ts < 60000; });
  } catch (_) { return []; }
}

function _saveRecentOtps(entries) {
  try { localStorage.setItem(_OTP_STORAGE_KEY, JSON.stringify(entries)); } catch (_) {}
}

function _checkOtpReuse(otp) {
  var entries = _loadRecentOtps();
  var hash = _hashOtp(otp);
  var match = entries.find(function(e) { return e.hash === hash; });
  return match || null;
}

function _recordOtp(otp, server) {
  var entries = _loadRecentOtps();
  entries.push({ hash: _hashOtp(otp), ts: Date.now(), server: server });
  _saveRecentOtps(entries);
}

var _backendAlive = false;

  if (_backendAlive === alive) return;
  _backendAlive = alive;

// --- WebSocket ---
function connectWS() {
  var proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(proto + '://' + location.host + '/ws');
  ws.onopen = function() { _setBackendAlive(true); };
  ws.onclose = function() {
    _setBackendAlive(false);
    setTimeout(connectWS, 3000);
  };
  ws.onmessage = function(e) {
    var d = e.data;
    if (d.charAt(0) === '{') {
      try {
        var msg = JSON.parse(d);
        if (msg.type === 'progress') { updateTaskProgress(msg); return; }
        if (msg.type === 'server_status') { _updateServerDots(msg.servers); return; }
      } catch(_) {}
    }

// --- API helpers ---
// Prompt user for OTP to enable SFTP on PSMP servers
async function _promptSftpOtp(serverName, allServers) {
  return new Promise(function(resolve) {
    var label = serverName ? ('SFTP — Enter OTP for ' + serverName) : 'SFTP — Enter OTP';
    var desc = serverName
      ? 'Enter a new OTP to open SFTP on <b>' + serverName + '</b>.'
      : 'Enter OTP to enable SFTP file transfer.';
    // Show full server list when multiple servers need OTP
    var listHtml = '';
    if (allServers && allServers.length > 1) {
      listHtml = '<p style="margin:4px 0 8px;font-size:12px;color:#888">' +
        'Servers needing OTP: ' + allServers.join(', ') + '</p>';
    }
    var overlay = document.createElement('div');
    overlay.className = 'modal-overlay show';
    overlay.innerHTML =
      '<div class="modal" style="width:360px">' +
        '<div class="modal-title">' + label + '</div>' +
        '<p style="margin:8px 0;font-size:13px">' + desc + '</p>' +
        listHtml +
        '<input id="sftpOtpInput" type="password" placeholder="OTP" style="width:100%;padding:6px;box-sizing:border-box;margin:4px 0 12px">' +
        '<div style="text-align:right">' +
          '<button id="sftpOtpCancel" class="btn" style="margin-right:8px">Cancel</button>' +
          '<button id="sftpOtpOk" class="btn btn-primary">Connect</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);
    var inp = document.getElementById('sftpOtpInput');
    inp.focus();
    function finish(val) { document.body.removeChild(overlay); resolve(val); }
    document.getElementById('sftpOtpCancel').onclick = function() { finish(null); };
    document.getElementById('sftpOtpOk').onclick = function() { finish(inp.value); };
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') finish(inp.value);
      if (e.key === 'Escape') finish(null);
    });
  });
}

// Pre-check and enable SFTP for multiple servers before file ops.
// Returns null on success, or error string if user cancelled / failed.
async function ensureSftpForServers(serverNames) {
  var check = await api('/api/check-sftp', { servers: serverNames });
  if (!check || !check.need_otp || !check.need_otp.length) return null; // all good

  var need = check.need_otp;

  // Prompt OTP for each server sequentially (info shown in the dialog itself)
  for (var i = 0; i < need.length; i++) {
    var hint = need.length > 1
      ? need[i] + ' (' + (i + 1) + '/' + need.length + ')'
      : need[i];
    var otp = await _promptSftpOtp(hint, need.length > 1 ? need : null);
    if (!otp) return 'SFTP cancelled by user';
    var enable = await api('/api/enable-sftp', { server: need[i], otp: otp });
    if (enable.error) return 'SFTP failed for ' + need[i] + ': ' + enable.error;
  }
  return null; // all enabled
}

// Wrapper: call API, handle need_sftp_otp by prompting for the specific server
async function apiWithSftp(url, body) {
  var r = await api(url, body);
  if (r && r.need_sftp_otp) {
    var otp = await _promptSftpOtp(r.server);
    if (!otp) return { error: 'SFTP cancelled by user' };
    var enable = await api('/api/enable-sftp', { server: r.server, otp: otp });
    if (enable.error) return { error: 'SFTP: ' + enable.error };
    // Retry original request
    r = await api(url, body);
  }
  return r;
}

async function api(url, body) {
  try {
    var res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    _setBackendAlive(true);
    return res.json();
  } catch (e) {
    _setBackendAlive(false);
    appendLine('[ERROR] Backend unreachable — connection lost');
    return { error: 'Backend unreachable' };
  }
}

async function apiGet(url) {
  try {
    var res = await fetch(url);
    _setBackendAlive(true);
    return res;
  } catch (e) {
    _setBackendAlive(false);
    return null;
  }
}

var _STATUS_ICONS = { pending: '\u25cb', running: '\u25ce', done: '\u2713', failed: '\u2717', skipped: '\u2013', cancelled: '\u2298' };
function updateTaskProgress(data) {
  var servers = data.servers || {};
  var serverNames = data.server_names || [];
  var taskNames = data.task_names || [];
  var progressDiv = document.getElementById('taskProgress');
  var fillEl = document.getElementById('progressFill');
  var textEl = document.getElementById('progressText');

  // Toggle Run/Cancel buttons
  var btnRun = document.getElementById('btnRun');
  var btnCancel = document.getElementById('btnCancel');
  if (btnRun) btnRun.style.display = data.running ? 'none' : '';
  if (btnCancel) {
    btnCancel.style.display = data.running ? '' : 'none';
    if (data.cancelling) { btnCancel.disabled = true; btnCancel.textContent = '⏳ Cancelling...'; }
    else { btnCancel.disabled = false; btnCancel.innerHTML = '&#x25a0; Cancel'; }
  }

  var totalAll = serverNames.length * taskNames.length;
  var doneAll = 0, failAll = 0, cancelledAll = 0;

  // --- Per-task status icon: show aggregate across servers ---
  taskNames.forEach(function(tname) {
    var tDone = 0, tFail = 0, tRunning = false, tCancelled = 0;
    serverNames.forEach(function(sname) {
      var info = (servers[sname] || {})[tname];
      if (!info) return;
      if (info.status === 'done') { tDone++; doneAll++; if (!info.success) { tFail++; failAll++; } }
      if (info.status === 'cancelled') { tCancelled++; cancelledAll++; }
      if (info.status === 'running') tRunning = true;
    });
    // Task status icon: show worst/current state
    var el = document.getElementById('taskStatus_' + tname);
    if (el) {
      var finished = tDone + tCancelled;
      var st = tCancelled === serverNames.length ? 'cancelled' : tFail > 0 ? 'failed' : tRunning ? 'running' : tDone === serverNames.length ? 'done' : tDone > 0 ? 'running' : tCancelled > 0 ? 'cancelled' : 'pending';
      el.textContent = _STATUS_ICONS[st] || '';
      el.className = 'task-status ' + st;
      el.style.display = 'inline-block';
    }
    // Per-task mini progress bar (task across servers)
    var mp = document.getElementById('taskMiniProgress_' + tname);
    if (mp) {
      mp.style.display = (data.running || tDone > 0 || tCancelled > 0) ? 'flex' : 'none';
      var pct = serverNames.length > 0 ? Math.round((tDone / serverNames.length) * 100) : 0;
      mp.querySelector('.mini-fill').style.width = pct + '%';
      mp.querySelector('.mini-fill').className = 'mini-fill' + (tFail > 0 ? ' has-failure' : '');
      var label = tDone + '/' + serverNames.length;
      if (tFail > 0) label += ' (' + tFail + ' failed)';
      if (tCancelled > 0) label += ' (' + tCancelled + ' cancelled)';
      mp.querySelector('.mini-text').textContent = label;
    }
  });

  // --- Per-server mini progress bar ---
  serverNames.forEach(function(sname) {
    var sDone = 0, sFail = 0, sCancelled = 0;
    taskNames.forEach(function(tname) {
      var info = (servers[sname] || {})[tname];
      if (info && info.status === 'done') { sDone++; if (!info.success) sFail++; }
      if (info && info.status === 'cancelled') sCancelled++;
    });
    var mp = document.getElementById('serverProgress_' + sname);
    if (mp) {
      mp.style.display = (data.running || sDone > 0 || sCancelled > 0) ? 'flex' : 'none';
      var pct = taskNames.length > 0 ? Math.round((sDone / taskNames.length) * 100) : 0;
      mp.querySelector('.mini-fill').style.width = pct + '%';
      mp.querySelector('.mini-fill').className = 'mini-fill' + (sFail > 0 ? ' has-failure' : '');
      var label = sDone + '/' + taskNames.length;
      if (sFail > 0) label += ' (' + sFail + ' failed)';
      if (sCancelled > 0) label += ' (' + sCancelled + ' cancelled)';
      mp.querySelector('.mini-text').textContent = label;
    }
  });

  // --- Overall progress bar ---
  if (totalAll > 0) {
    progressDiv.style.display = 'block';
    var completedAll = doneAll + cancelledAll;
    var pct = Math.round((completedAll / totalAll) * 100);
    fillEl.style.width = pct + '%';
    fillEl.className = 'progress-fill' + (failAll > 0 ? ' has-failure' : cancelledAll > 0 ? ' has-cancelled' : '');
    var extra = '';
    if (failAll > 0) extra += ', ' + failAll + ' failed';
    if (cancelledAll > 0) extra += ', ' + cancelledAll + ' cancelled';
    if (data.running) {
      var cur = data.current_server || '';
      if (data.cancelling) {
        textEl.textContent = 'Cancelling — waiting for current task on ' + (cur || '...') + extra;
      } else {
        textEl.textContent = doneAll + '/' + totalAll + (cur ? ' — ' + cur : '') + extra;
      }
    } else {
      textEl.textContent = doneAll + '/' + totalAll + ' completed' + extra;
    }
  } else if (!data.running) {
    progressDiv.style.display = 'none';
  }
}

var _histIdx = -1;
var _histDraft = '';
function cmdInputKeydown(e) {
  var suggestOpen = document.getElementById('aliasSuggest').style.display === 'block';
  if (suggestOpen) {
    if (e.key === 'ArrowDown') { e.preventDefault(); _suggestNav(1); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); _suggestNav(-1); return; }
    if (e.key === 'Tab' || e.key === 'Enter') {
      if (_suggestAccept()) { e.preventDefault(); return; }
    }
    if (e.key === 'Escape') { document.getElementById('aliasSuggest').style.display = 'none'; return; }
  }
  if (e.key === 'Enter') { runCommand(); _histIdx = -1; return; }
  if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
  e.preventDefault();
  var select = document.getElementById('cmdHistory');
  var opts = [];
  for (var i = 1; i < select.options.length; i++) {
    var v = select.options[i].value;
    if (v && v !== '__clear_all__') opts.push(v);
  }
  if (!opts.length) return;
  if (_histIdx === -1) _histDraft = document.getElementById('cmdInput').value;
  if (e.key === 'ArrowUp') {
    _histIdx = Math.min(_histIdx + 1, opts.length - 1);
  } else {
    _histIdx--;
  }
  var input = document.getElementById('cmdInput');
  if (_histIdx < 0) {
    _histIdx = -1;
    input.value = _histDraft;
  } else {
    input.value = opts[_histIdx];
  }
}

async function copyHosts() {
  var items = document.querySelectorAll('.server-cb:checked');
  if (!items.length) { appendLine('[ERROR] No servers selected — check the servers you want to copy'); return; }
  var hosts = Array.from(items).map(function(cb) {
    var item = cb.closest('.server-item');
    return item ? (item.dataset.host || cb.value) : cb.value;
  });
  if (!hosts.length) { appendLine('[ERROR] No servers to copy'); return; }
  var text = hosts.join(',');
  try {
    await navigator.clipboard.writeText(text);
    appendLine('Copied ' + hosts.length + ' host(s) to clipboard: ' + text);
  } catch (e) {
    // Fallback for non-HTTPS
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    appendLine('Copied ' + hosts.length + ' host(s) to clipboard: ' + text);
  }
}

async function connectSelected() {
  var names = getSelectedServers();
  if (!names.length) { appendLine('[ERROR] No servers selected'); return; }

  // Split selected servers into PSMP (needs OTP, not yet connected) and direct
  var res = await fetch('/api/servers');
  var allServers = await res.json();
  var psmpNames = [];
  var directNames = [];
  names.forEach(function(name) {
    var s = allServers.find(function(sv) { return sv.name === name; });
    if (s && s.needs_otp && !s.connected) psmpNames.push(name);
    else directNames.push(name);
  });

  // Connect direct servers in parallel (no OTP needed)
  if (directNames.length) {
    appendLine('Connecting to ' + directNames.join(', ') + '...');
    await api('/api/connect', { servers: directNames });
  }

  // Connect PSMP servers one by one, each with its own OTP
  var psmpAborted = false;
  for (var i = 0; i < psmpNames.length && !psmpAborted; i++) {
    var label = psmpNames.length > 1
      ? 'Enter OTP for <b>' + psmpNames[i] + '</b> (' + (i + 1) + '/' + psmpNames.length + '):'
      : 'Enter OTP:';
    var connected = false;
    while (!connected) {
      var otp = await modalPrompt('PSMP Authentication', label, '', 'One-time password', { narrow: true, otp: true });
      if (!otp) {
        // User cancelled — skip this server or stop all?
        if (i < psmpNames.length - 1) {
          var skipAll = await modalConfirm('Skip Server',
            'Skip <b>' + psmpNames[i] + '</b> and continue to next server?<br><br>'
            + 'Choose <b>OK</b> to skip this one, or <b>Cancel</b> to stop all.');
          if (!skipAll) psmpAborted = true;
        }
        break;
      }
      // Check if this OTP was already used recently
      var reuse = _checkOtpReuse(otp);
      if (reuse) {
        var ago = Math.round((Date.now() - reuse.ts) / 1000);
        var ok = await modalConfirm('OTP Reuse Warning',
          'This OTP was used <b>' + ago + 's ago</b> to connect <b>' + reuse.server + '</b>.<br><br>'
          + 'OTP is single-use — reusing it will likely fail.<br><br>Continue anyway?');
        if (!ok) continue;  // re-prompt for this server
      }
      _recordOtp(otp, psmpNames[i]);
      appendLine('Connecting to ' + psmpNames[i] + '...');
      var result = await api('/api/connect', { servers: [psmpNames[i]], otp: otp });
      // Check if connection succeeded
      var status = result && result[psmpNames[i]];
      if (status && status.indexOf('error') === 0) {
        var retry = await modalConfirm('Connection Failed',
          '<b>' + psmpNames[i] + '</b>: ' + status + '<br><br>Retry with a new OTP?');
        if (retry) continue;  // re-prompt OTP
        break;  // skip this server
      }
      connected = true;
    }
  }

  setTimeout(loadServers, 1000);
}

async function runSelectedTasks() {
  var servers = getSelectedServers();
  if (!servers.length) { appendLine('[ERROR] No servers selected'); return; }
  var taskNames = getSelectedTasks();
  if (!taskNames.length) { appendLine('[ERROR] No tasks selected'); return; }

  // Validate selected tasks before running
  var errors = [];
  var warnings = [];
  var selected = _cachedTasks.filter(function(t) { return taskNames.indexOf(t.name) >= 0; });
  selected.forEach(function(t) {
    if (t.type === 'command') {
      if (!t.command || !t.command.trim()) { errors.push((t.command || t.name) + ': command is empty'); }
      else {
        var err = checkInteractiveCmd(t.command);
        if (err) errors.push(t.command + ': ' + err);
        if (t.modifying) warnings.push(t.command);
      }
    }
    if (t.type === 'upload') {
      var udesc = (t.src && t.dest) ? t.src + ' -> ' + t.dest : (t.src || t.dest || t.name);
      if (!t.src) errors.push(udesc + ': missing src');
      else if (!t.src.startsWith('/') && !(t.src.length >= 3 && t.src[1] === ':')) errors.push(udesc + ': src must be an absolute path');
      else if (/[\/\\]$/.test(t.src)) errors.push(udesc + ': src must be a file path, not directory');
      if (!t.dest) errors.push(udesc + ': missing dest');
      else if (!t.dest.startsWith('/')) errors.push(udesc + ': dest must start with /');
      else if (/[\/\\]$/.test(t.dest)) errors.push(udesc + ': dest must be a file path, not directory');
    }
    if (t.type === 'script') {
      if (!t.src) errors.push((t.src || t.name) + ': missing src for script task');
    }
  });

  if (errors.length) {
    errors.forEach(function(e) { appendLine('[ERROR] ' + e); });
    return;
  }
  if (warnings.length) {
    appendLine('[WARN] Modifying commands: ' + warnings.join(', '));
  }

  appendLine('Running ' + taskNames.length + ' task(s) on ' + servers.join(', ') + '...');
  var result = await api('/api/run', { servers: servers, tasks: taskNames });
  if (result.error) appendLine('[ERROR] ' + result.error);
  updateTaskCount();
}

var INTERACTIVE_CMDS = ['top','htop','iotop','atop','nmon','glances','vi','vim','nvim','nano','emacs','pico','joe','mcedit','less','more','man','ssh','telnet','ftp','sftp','screen','tmux','byobu','mc'];
var MODIFYING_CMDS = ['rm','rmdir','mv','cp','chmod','chown','chgrp','kill','killall','pkill','reboot','shutdown','halt','poweroff','init','mkfs','fdisk','parted','dd','userdel','useradd','usermod','groupdel','groupadd','iptables','firewall-cmd','ufw','yum','apt','apt-get','dnf','rpm','dpkg','pip','pip3'];

function isModifyingCmd(cmd) {
  var parts = cmd.trim().split(/\s+/);
  var base = parts[0].replace(/^.*[\/\\]/, '');
  if (MODIFYING_CMDS.indexOf(base) >= 0) return true;
  if (base === 'sudo' && parts.length > 1 && MODIFYING_CMDS.indexOf(parts[1].replace(/^.*[\/\\]/, '')) >= 0) return true;
  if (/\bsystemctl\s+(restart|stop|start|enable|disable|reload)\b/.test(cmd)) return true;
  if (/\bservice\s+\S+\s+(restart|stop|start)\b/.test(cmd)) return true;
  if (/>[^>]/.test(cmd)) return true;
  return false;
}

function checkInteractiveCmd(cmd) {
  var base = cmd.trim().split(/\s+/)[0].replace(/^.*[\/\\]/, '');
  if (INTERACTIVE_CMDS.indexOf(base) >= 0) return "'" + base + "' is an interactive command and cannot be run via SSH Ops";
  if (/\btail\b.*\s-[^\s]*f/.test(cmd)) return "tail -f (follow mode) is interactive";
  if (/\bping\b(?!.*\s-c\b)/.test(cmd)) return "ping without -c runs forever";
  if (/\bwatch\b/.test(cmd)) return "watch is interactive";
  return null;
}

var _adhocTimer = null;
var _adhocCountdown = null;
var _adhocSeconds = 0;
var ADHOC_TIMEOUT = 60;

function toggleAdhoc(on) {
  var panel = document.getElementById('actionsPanel');
  var cdEl = document.getElementById('adhocCountdown');
  clearInterval(_adhocTimer);
  clearInterval(_adhocCountdown);
  if (on) {
    panel.classList.remove('locked');
    _resetAdhocTimer();
  } else {
    panel.classList.add('locked');
    cdEl.textContent = '';
    document.getElementById('adhocToggle').checked = false;
  }
}

function _resetAdhocTimer() {
  clearInterval(_adhocTimer);
  clearInterval(_adhocCountdown);
  _adhocSeconds = ADHOC_TIMEOUT;
  var cdEl = document.getElementById('adhocCountdown');
  cdEl.textContent = _adhocSeconds + 's';
  _adhocCountdown = setInterval(function() {
    _adhocSeconds--;
    cdEl.textContent = _adhocSeconds + 's';
    if (_adhocSeconds <= 0) {
      toggleAdhoc(false);
    }
  }, 1000);
}

function _touchAdhoc() {
  if (document.getElementById('adhocToggle').checked) {
    _resetAdhocTimer();
  }
}
