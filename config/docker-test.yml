# Docker test environment — use with docker/start.sh
# Tests: server warnings (prod-app1 triggers PROD badge), auto-backup, dest check

servers:
- name: dev-node1
  host: 127.0.0.1
  port: 2201
  username: admin
  password: admin123

- name: dev-node2
  host: 127.0.0.1
  port: 2202
  username: admin
  password: admin123

- name: prod-app1
  host: 127.0.0.1
  port: 2203
  username: admin
  password: admin123

tasks:
- command: hostname
- command: df -h
- command: /opt/app/status.sh
- command: cat /etc/os-release

aliases:
  disk: "df -h"
  mem: "free -m"

logs:
- name: ig-route
  path: /opt/ig/logs/route-system.log
  type: ping-gateway
- name: am-auth
  path: /opt/am/debug/amAuthentication
  type: ping-am
- name: ds-errors
  path: /opt/ds/logs/errors
  type: ping-ds
- name: idm-main
  path: /opt/idm/logs/openidm0.log
  type: ping-idm
- name: app-log
  path: /var/log/app.log
  type: generic
